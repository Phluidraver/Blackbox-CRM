function DealFiles({dealId,isNew}){
  const storageKey=dealId?`bba_files_${dealId}`:null;
  const[files,setFiles]=useState(()=>{if(!storageKey)return[];try{return JSON.parse(localStorage.getItem(storageKey)||"[]");}catch{return[];}});
  const[uploading,setUploading]=useState(false);const[confirmDel,setConfirmDel]=useState(null);const[dragging,setDragging]=useState(false);const fileRef=useRef();
  const fmtSize=b=>{if(b>=1024*1024)return(b/1024/1024).toFixed(1)+" MB";if(b>=1024)return(b/1024).toFixed(0)+" KB";return b+" B";};
  const fmtDate=ts=>new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const fileIcon=name=>{const ext=name.split(".").pop().toLowerCase();if(["pdf"].includes(ext))return"📄";if(["doc","docx"].includes(ext))return"📝";if(["xls","xlsx","csv"].includes(ext))return"📊";if(["jpg","jpeg","png","gif","webp"].includes(ext))return"🖼️";if(["zip","rar"].includes(ext))return"🗜️";if(["ppt","pptx"].includes(ext))return"📋";return"📎";};
  const persist=updated=>{setFiles(updated);if(storageKey)try{localStorage.setItem(storageKey,JSON.stringify(updated));}catch(e){alert("Storage full.");}};
  const processFiles=async(fileList)=>{
    const picked=Array.from(fileList||[]);if(!picked.length)return;
    setUploading(true);
    for(const file of picked){
      await new Promise(resolve=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          const entry={id:genId("FL"),name:file.name,size:file.size,type:file.type,addedAt:Date.now(),data:ev.target.result};
          setFiles(prev=>{const upd=[...prev,entry];if(storageKey)try{localStorage.setItem(storageKey,JSON.stringify(upd));}catch{alert("Storage full.");}return upd;});
          resolve();
        };
        reader.readAsDataURL(file);
      });
    }
    setUploading(false);
  };
  const handleInputChange=async e=>{await processFiles(e.target.files);e.target.value="";};
  const handleDrop=async e=>{e.preventDefault();e.stopPropagation();setDragging(false);await processFiles(e.dataTransfer.files);};
  const handleDragOver=e=>{e.preventDefault();e.stopPropagation();setDragging(true);};
  const handleDragLeave=e=>{e.preventDefault();setDragging(false);};
  const download=f=>{const a=document.createElement("a");a.href=f.data;a.download=f.name;document.body.appendChild(a);a.click();document.body.removeChild(a);};
  const doDelete=id=>{persist(files.filter(f=>f.id!==id));setConfirmDel(null);};
  if(isNew)return(<div style={{textAlign:"center",padding:"36px 20px",color:"var(--text-3)"}}><div style={{fontSize:32,marginBottom:10}}>💾</div><div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Save the deal first</div><div style={{fontSize:12}}>Files can be attached after saving.</div></div>);
  const totalSize=files.reduce((s,f)=>s+f.size,0);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div><div style={{fontWeight:600,fontSize:13}}>{files.length} file{files.length!==1?"s":""} attached</div>{files.length>0&&<div style={{fontSize:11,color:"var(--text-3)",marginTop:2}}>{fmtSize(totalSize)} total</div>}</div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>{uploading&&<span style={{fontSize:12,color:"var(--text-3)"}}>Uploading…</span>}<button className="btn btn-primary btn-sm" onClick={()=>fileRef.current.click()} disabled={uploading}><Ic.Plus/> Upload Files</button><input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={handleInputChange}/></div>
    </div>
    <div
      onDrop={handleDrop}
      onDragOver={handleDragOver}
      onDragLeave={handleDragLeave}
      onDragEnter={e=>{e.preventDefault();setDragging(true);}}
      style={{border:`2px dashed ${dragging?"var(--primary)":"var(--border)"}`,borderRadius:10,padding:files.length===0?"32px 20px":"8px",background:dragging?"var(--primary-light)":"transparent",transition:"all 0.15s"}}
    >
      {files.length===0?(
        <div style={{textAlign:"center",cursor:"pointer"}} onClick={()=>fileRef.current.click()}>
          <div style={{fontSize:28,marginBottom:8}}>📎</div>
          <div style={{fontSize:13,fontWeight:600,color:"var(--text-2)",marginBottom:4}}>{dragging?"Drop files here!":"Drop files here or click to browse"}</div>
          <div style={{fontSize:12,color:"var(--text-3)"}}>PDFs, Word docs, spreadsheets, images — any file type</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:6}}>{files.map(f=>(
          <div key={f.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"var(--bg)",borderRadius:8,border:"1px solid var(--border)"}}>
            <span style={{fontSize:20}}>{fileIcon(f.name)}</span>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div><div style={{fontSize:11,color:"var(--text-3)",marginTop:1}}>{fmtSize(f.size)} · {fmtDate(f.addedAt)}</div></div>
            <button className="btn btn-secondary btn-sm" onClick={()=>download(f)}>⬇ Download</button>
            <button className="btn btn-ghost btn-icon btn-sm" style={{color:"#EF4444"}} onClick={()=>setConfirmDel(f.id)}><Ic.Trash/></button>
          </div>
        ))}
        {dragging&&<div style={{textAlign:"center",padding:"12px",color:"var(--primary)",fontWeight:600,fontSize:13}}>Drop to add more files</div>}
        </div>
      )}
    </div>
    {confirmDel&&<Confirm msg="Delete this file?" onConfirm={()=>doDelete(confirmDel)} onCancel={()=>setConfirmDel(null)}/>}
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   USER MANAGEMENT
═══════════════════════════════════════════════════════════════ */
function UserManagement({users,setUsers,currentUser,toast,onMigrateComplete}){
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[migrating,setMigrating]=useState(false);
  const[migrateStatus,setMigrateStatus]=useState(null);
  const def={full_name:"",email:"",password_plain:"",role:"user"};
  const[form,setForm]=useState(def);
  const[showPw,setShowPw]=useState({});

  // count what's in localStorage right now
  const lsCounts=useMemo(()=>{
    try{
      const d=JSON.parse(localStorage.getItem("bba_deals")||"[]").length;
      const c=JSON.parse(localStorage.getItem("bba_contacts")||"[]").length;
      const t=JSON.parse(localStorage.getItem("bba_tasks")||"[]").length;
      const m=JSON.parse(localStorage.getItem("bba_meetings")||"[]").length;
      return{deals:d,contacts:c,tasks:t,meetings:m,total:d+c+t+m};
    }catch{return{deals:0,contacts:0,tasks:0,meetings:0,total:0};}
  },[]);

  const doMigrate=async()=>{
    setMigrating(true);setMigrateStatus(null);
    try{
      const lsDeals=JSON.parse(localStorage.getItem("bba_deals")||"[]");
      const lsContacts=JSON.parse(localStorage.getItem("bba_contacts")||"[]");
      const lsTasks=JSON.parse(localStorage.getItem("bba_tasks")||"[]");
      const lsMeetings=JSON.parse(localStorage.getItem("bba_meetings")||"[]");
      let pushed=0;
      for(const d of lsDeals){await DB.upsertDeal(objToRow({...d,assignees:d.assignees||[]}));pushed++;}
      for(const c of lsContacts){await DB.upsertContact(objToRow({...c,assignees:c.assignees||[]}));pushed++;}
      for(const t of lsTasks){await DB.upsertTask(objToRow({...t,assignees:t.assignees||[]}));pushed++;}
      for(const m of lsMeetings){await DB.upsertMeeting({id:m.id,data:m});pushed++;}
      setMigrateStatus({success:true,msg:`✅ Migrated ${lsDeals.length} deals, ${lsContacts.length} contacts, ${lsTasks.length} tasks, ${lsMeetings.length} meetings to Supabase.`});
      toast("Migration complete — reload to see your data","success");
      if(onMigrateComplete)onMigrateComplete();
    }catch(e){
      setMigrateStatus({success:false,msg:`Migration failed: ${e.message}`});
      toast("Migration failed: "+e.message,"error");
    }
    setMigrating(false);
  };

  const openEdit=u=>{setForm({full_name:u.full_name,email:u.email,password_plain:u.password_plain,role:u.role});setModal(u);};
  const openAdd=()=>{setForm(def);setModal("add");};

  const doSave=async()=>{
    if(!form.full_name.trim()||!form.email.trim()||!form.password_plain.trim())return alert("Name, email and password are required.");
    try{
      if(modal==="add"){
        const newUser={id:crypto.randomUUID(),full_name:form.full_name.trim(),email:form.email.trim().toLowerCase(),password_plain:form.password_plain,role:form.role,is_super_admin:false};
        await DB.upsertUser(newUser);
        setUsers(p=>[...p,newUser]);toast("User added","success");
      }else{
        const upd={...modal,full_name:form.full_name.trim(),email:form.email.trim().toLowerCase(),password_plain:form.password_plain,role:form.role};
        await DB.upsertUser(upd);
        setUsers(p=>p.map(u=>u.id===modal.id?upd:u));toast("User updated","success");
      }
      setModal(null);
    }catch(e){toast("Save failed: "+e.message,"error");}
  };

  const doDelete=async id=>{
    try{await DB.deleteUser(id);setUsers(p=>p.filter(u=>u.id!==id));toast("User deleted","success");setConfirm(null);}
    catch(e){toast("Delete failed: "+e.message,"error");}
  };

  return(<div>
    {/* ── MIGRATION PANEL ── */}
    {lsCounts.total>0&&!migrateStatus&&(
      <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:10,padding:"16px 20px",marginBottom:24,display:"flex",alignItems:"center",gap:16}}>
        <span style={{fontSize:28,flexShrink:0}}>📦</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:14,color:"#92400E",marginBottom:4}}>Local data found — migration needed</div>
          <div style={{fontSize:13,color:"#78350F",lineHeight:1.6}}>
            Found <strong>{lsCounts.deals} deals</strong>, <strong>{lsCounts.contacts} contacts</strong>, <strong>{lsCounts.tasks} tasks</strong>, and <strong>{lsCounts.meetings} meetings</strong> stored locally in this browser. Click <strong>Migrate to Supabase</strong> to transfer this data to the cloud so all users can see it.
          </div>
        </div>
        <button className="btn btn-primary" style={{flexShrink:0,background:"#D97706",borderColor:"#D97706"}} onClick={doMigrate} disabled={migrating}>
          {migrating?<><span style={{fontSize:12}}>Migrating…</span></>:<>☁️ Migrate to Supabase</>}
        </button>
      </div>
    )}
    {migrateStatus&&(
      <div style={{background:migrateStatus.success?"#F0FDF4":"#FEF2F2",border:`1px solid ${migrateStatus.success?"#BBF7D0":"#FECACA"}`,borderRadius:10,padding:"14px 18px",marginBottom:24,display:"flex",alignItems:"center",gap:12}}>
        <div style={{fontSize:13,color:migrateStatus.success?"#16a34a":"#dc2626",flex:1}}>{migrateStatus.msg}</div>
        {migrateStatus.success&&<button className="btn btn-success btn-sm" onClick={()=>window.location.reload()}>Reload Now →</button>}
      </div>
    )}

    {/* ── USER LIST ── */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div><div style={{fontFamily:"Cormorant Garamond,serif",fontSize:18,fontWeight:700}}>User Management</div><div style={{fontSize:12,color:"var(--text-3)",marginTop:2}}>{users.length} user{users.length!==1?"s":""} · Admins can view and edit all records</div></div>
      <button className="btn btn-primary" onClick={openAdd}><Ic.Plus/> Add User</button>
    </div>
    <div>{users.map(u=>(
      <div key={u.id} className="user-card" onClick={()=>openEdit(u)}>
        <div className="user-card-avatar" style={{background:avColor(u.full_name)}}>{initials(u.full_name)}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div className="user-card-name">{u.full_name}</div>
            {u.is_super_admin&&<span style={{fontSize:10,background:"rgba(241,92,43,0.15)",color:"var(--primary)",padding:"1px 7px",borderRadius:20,fontWeight:700}}>SUPER ADMIN</span>}
            {!u.is_super_admin&&<span className={u.role==="admin"?"role-badge-admin":"role-badge-user"}>{u.role==="admin"?"Admin":"User"}</span>}
          </div>
          <div className="user-card-email">{u.email}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{fontSize:11,color:"var(--text-3)",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6,padding:"3px 10px",fontFamily:"DM Mono,monospace"}}>
            {showPw[u.id]?u.password_plain:"••••••••"}
          </div>
          <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={e=>{e.stopPropagation();setShowPw(p=>({...p,[u.id]:!p[u.id]}))}}>
            {showPw[u.id]?"Hide":"Show"}
          </button>
        </div>
        {!u.is_super_admin&&<button className="btn btn-ghost btn-icon btn-sm" style={{color:"#EF4444"}} onClick={e=>{e.stopPropagation();setConfirm(u.id);}}><Ic.Trash/></button>}
      </div>
    ))}</div>

    {modal&&(
      <div className="overlay"><div className="modal" style={{maxWidth:480}}>
        <div className="modal-hdr"><div className="modal-title">{modal==="add"?"Add User":"Edit User"}</div><button className="btn btn-ghost btn-icon" onClick={()=>setModal(null)}><Ic.X/></button></div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="fg full"><label className="form-label">Full Name *</label><NoFillInput className="form-input" value={form.full_name} onChange={e=>setForm(p=>({...p,full_name:e.target.value}))}/></div>
            <div className="fg full"><label className="form-label">Email *</label><NoFillInput className="form-input" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="user@example.com"/></div>
            <div className="fg full"><label className="form-label">Password *</label><NoFillInput className="form-input" value={form.password_plain} onChange={e=>setForm(p=>({...p,password_plain:e.target.value}))}/></div>
            <div className="fg full"><label className="form-label">Role</label>
              <select className="form-select" value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))} disabled={modal!=="add"&&modal?.is_super_admin}>
                <option value="user">User — sees only assigned records</option>
                <option value="admin">Admin — sees all records</option>
              </select>
            </div>
          </div>
          {modal!=="add"&&modal?.is_super_admin&&<div style={{marginTop:12,padding:"10px 12px",background:"rgba(241,92,43,0.07)",borderRadius:6,fontSize:12,color:"var(--primary)"}}>⚠ Super-admin role cannot be changed.</div>}
        </div>
        <div className="modal-ftr">
          <button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={doSave}>Save User</button>
        </div>
      </div></div>
    )}
    {confirm&&<Confirm msg="Permanently delete this user?" onConfirm={()=>doDelete(confirm)} onCancel={()=>setConfirm(null)}/>}
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   DASHBOARD  (abbreviated — passes currentUser/isAdmin)
═══════════════════════════════════════════════════════════════ */
function Dashboard({deals,contacts,meetings,tasks,buyBox,setSection,isAdmin}){
  const now=new Date();const today=todayStr();
  const in14=new Date(now);in14.setDate(now.getDate()+14);
  const weekAgo=new Date(now);weekAgo.setDate(now.getDate()-7);
  const monthAgo=new Date(now);monthAgo.setMonth(now.getMonth()-1);
  const cDeals=deals.map(computeDeal);
  const active=cDeals.filter(d=>d.status==="Active");
  const newThisWeek=deals.filter(d=>d.dateAdded&&new Date(d.dateAdded)>=weekAgo).length;
  const newThisMonth=deals.filter(d=>d.dateAdded&&new Date(d.dateAdded)>=monthAgo).length;
  const totalPipeVal=active.reduce((s,d)=>s+(parseFloat(d.askingPrice)||0),0);
  const overdueDue=active.filter(d=>d.nextStepDueDate&&d.nextStepDueDate<today);
  const dueToday=active.filter(d=>d.nextStepDueDate===today);
  const stale14=active.filter(d=>d.lastActivityDate&&daysSince(d.lastActivityDate)>=14&&daysSince(d.lastActivityDate)<30);
  const stale30=active.filter(d=>d.lastActivityDate&&daysSince(d.lastActivityDate)>=30);
  const fin=active.filter(d=>d.financeabilityStatus);
  const finGood=fin.filter(d=>d.financeabilityStatus==="Financeable");
  const finBorder=fin.filter(d=>d.financeabilityStatus==="Borderline");
  const finBad=fin.filter(d=>d.financeabilityStatus==="Not Financeable");
  const apEbitdas=active.filter(d=>d.apToEbitda).map(d=>parseFloat(d.apToEbitda));
  const medEbitda=median(apEbitdas);
  const topOpps=[...active].filter(d=>d.overallDealScore).sort((a,b)=>(parseFloat(b.overallDealScore)||0)-(parseFloat(a.overallDealScore)||0)).slice(0,8);
  const redFlags=[...active].filter(d=>parseInt(d.redFlagCount)>0).sort((a,b)=>(parseInt(b.redFlagCount)||0)-(parseInt(a.redFlagCount)||0)).slice(0,5);
  const srcMap={};deals.forEach(d=>{if(!d.leadSource)return;if(!srcMap[d.leadSource])srcMap[d.leadSource]={total:0,scores:[],loi:0};srcMap[d.leadSource].total++;if(d.overallDealScore)srcMap[d.leadSource].scores.push(parseFloat(d.overallDealScore));if(d.loiSubmitted)srcMap[d.leadSource].loi++;});
  const sources=Object.entries(srcMap).sort((a,b)=>b[1].total-a[1].total).slice(0,6);
  const stageAging=STAGES.slice(0,8).map(s=>{const sl=active.filter(d=>d.stage===s&&d.stageEntryDate);const days=sl.map(d=>daysSince(d.stageEntryDate)).filter(n=>n!==null);return{stage:s,count:active.filter(d=>d.stage===s).length,avgDays:days.length?Math.round(days.reduce((a,b)=>a+b,0)/days.length):null};}).filter(s=>s.count>0);
  const alerts=[];
  overdueDue.forEach(d=>alerts.push({level:"high",msg:`Overdue next step: ${d.companyName}`,deal:d}));
  stale30.forEach(d=>alerts.push({level:"high",msg:`No activity 30+ days: ${d.companyName}`,deal:d}));
  active.filter(d=>d.exclusivityEndDate&&daysBetween(today,d.exclusivityEndDate)<=7&&daysBetween(today,d.exclusivityEndDate)>=0).forEach(d=>alerts.push({level:"high",msg:`Exclusivity ending ${fmtD(d.exclusivityEndDate)}: ${d.companyName}`,deal:d}));
  stale14.forEach(d=>alerts.push({level:"med",msg:`No activity 14+ days: ${d.companyName}`,deal:d}));
  active.filter(d=>d.dscr&&parseFloat(d.dscr)<1.10).forEach(d=>alerts.push({level:"med",msg:`DSCR below threshold (${d.dscr}x): ${d.companyName}`,deal:d}));
  active.filter(d=>parseInt(d.redFlagCount)>=3).forEach(d=>alerts.push({level:"med",msg:`${d.redFlagCount} red flags: ${d.companyName}`,deal:d}));
  dueToday.forEach(d=>alerts.push({level:"low",msg:`Due today: ${d.companyName}`,deal:d}));
  const openTasks=tasks.filter(t=>t.status!=="Completed").sort((a,b)=>{const aO=isOD(a.dueDate,a.status),bO=isOD(b.dueDate,b.status);if(aO&&!bO)return -1;if(!aO&&bO)return 1;const p={High:0,Medium:1,Low:2};return(p[a.priority]||1)-(p[b.priority]||1);}).slice(0,5);
  const upcoming=meetings.filter(m=>{const d=new Date(m.date+"T00:00:00");return d>=now&&d<=in14&&m.status!=="Cancelled";}).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  const BarRow=({label,value,max,fmtFn=String})=>(<div style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12.5,fontWeight:600}}>{label}</span><span style={{fontSize:12,fontFamily:"DM Mono,monospace",color:"var(--text-2)"}}>{fmtFn(value)}</span></div><div className="prog-bar"><div className="prog-fill" style={{width:`${max?Math.min(value/max*100,100):0}%`,background:"var(--primary)"}}/></div></div>);
  return(<div>
    <div className="kpi-grid" style={{gridTemplateColumns:"repeat(5,1fr)"}}>
      <div className="kpi-card"><div className="kpi-label">Active Deals</div><div className="kpi-value">{active.length}</div><div className="kpi-sub">+{newThisWeek} this week</div></div>
      <div className="kpi-card accent-blue"><div className="kpi-label">Pipeline Value</div><div className="kpi-value">{fmt$Short(totalPipeVal)}</div><div className="kpi-sub">+{newThisMonth} this month</div></div>
      <div className="kpi-card accent-green"><div className="kpi-label">Financeable</div><div className="kpi-value success">{finGood.length}</div><div className="kpi-sub">{finBorder.length} borderline · {finBad.length} not</div></div>
      <div className="kpi-card accent-red"><div className="kpi-label">Need Action</div><div className="kpi-value danger">{overdueDue.length+stale14.length+stale30.length}</div><div className="kpi-sub">{overdueDue.length} overdue · {stale30.length} stale 30d</div></div>
      <div className="kpi-card accent-amber"><div className="kpi-label">Median Multiple</div><div className="kpi-value">{medEbitda?medEbitda.toFixed(1)+"x":"—"}</div><div className="kpi-sub">EBITDA · {apEbitdas.length} deals</div></div>
    </div>
    {alerts.length>0&&<div className="card" style={{marginBottom:14}}><div className="card-title"><Ic.Alert/> Alerts <Badge color="red">{alerts.length}</Badge></div>{alerts.slice(0,8).map((a,i)=><div key={i} className={`alert-item alert-${a.level}`} onClick={()=>setSection("pipeline")}><span style={{flex:1}}>{a.msg}</span><span style={{fontSize:10,opacity:0.7,textTransform:"uppercase",fontWeight:700}}>{a.level}</span></div>)}</div>}
    <div className="dash-row dash-row-2">
      <div className="card"><div className="card-title">📋 Deals Needing Action</div>
        {[...overdueDue.map(d=>({d,label:"Overdue",color:"#dc2626"})),...stale30.map(d=>({d,label:"30d inactive",color:"#d97706"})),...stale14.map(d=>({d,label:"14d inactive",color:"#d97706"})),...dueToday.map(d=>({d,label:"Due today",color:"#2563eb"}))].slice(0,7).map(({d,label,color},i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
            <div><div style={{fontWeight:600,fontSize:13}}>{d.companyName}</div><div style={{fontSize:11,color:"var(--text-3)"}}>{d.nextStep||"No next step"}</div></div>
            <span style={{fontSize:11,fontWeight:700,color,background:`${color}18`,padding:"2px 8px",borderRadius:20,flexShrink:0}}>{label}</span>
          </div>
        ))}
        {overdueDue.length===0&&stale30.length===0&&stale14.length===0&&dueToday.length===0&&<div style={{fontSize:13,color:"var(--text-3)"}}>All caught up! ✓</div>}
      </div>
      <div className="card"><div className="card-title">📅 Upcoming Meetings</div>
        {upcoming.length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No upcoming meetings.</div>:upcoming.map(m=><div key={m.id} style={{borderBottom:"1px solid var(--border)",paddingBottom:9,marginBottom:9}}><div style={{fontWeight:600,fontSize:13}}>{m.title}</div><div style={{fontSize:11,color:"var(--text-3)",marginTop:2}}>{fmtD(m.date)}{m.time?` · ${m.time}`:""}</div></div>)}
        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)"}}><div style={{fontFamily:"Cormorant Garamond,serif",fontSize:14,fontWeight:600,marginBottom:8}}>Open Tasks</div>
          {openTasks.length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No open tasks.</div>:openTasks.map(t=>{const od=isOD(t.dueDate,t.status);return<div key={t.id} style={{display:"flex",gap:7,alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid var(--border)"}}><span style={{color:od?"#EF4444":"var(--text-3)",fontSize:12,marginTop:1}}>{od?"⚠":"•"}</span><div><div style={{fontSize:12.5,fontWeight:600,color:od?"#EF4444":"var(--text)"}}>{t.title}</div><div style={{fontSize:11,color:"var(--text-3)"}}>{fmtD(t.dueDate)} · {t.priority}</div></div></div>;})}
        </div>
      </div>
    </div>
    <div className="card" style={{marginBottom:14}}><div className="card-title">📊 Pipeline by Stage</div>
      <div className="pipe-bar">{STAGES.map(s=>{const tot=active.filter(d=>d.stage===s).reduce((x,d)=>x+(parseFloat(d.askingPrice)||0),0);const w=totalPipeVal?tot/totalPipeVal*100:0;return w>0?<div key={s} className="pipe-seg" style={{width:`${w}%`,background:STAGE_HEX[s]}} title={`${s}: ${fmt$(tot)}`}/>:null;})}</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6}}>{STAGES.map(s=>{const cnt=active.filter(d=>d.stage===s).length;return cnt>0?<div key={s} style={{display:"flex",alignItems:"center",gap:4,fontSize:11}}><span style={{width:7,height:7,borderRadius:"50%",background:STAGE_HEX[s],flexShrink:0}}/><span style={{color:"var(--text-2)"}}>{s}</span><span style={{fontFamily:"DM Mono,monospace",color:"var(--text-3)"}}>{cnt}</span></div>:null;})}</div>
    </div>
    <div className="dash-row dash-row-3">
      <div className="card"><div className="card-title">⭐ Top Opportunities</div>{topOpps.length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No scored deals yet.</div>:topOpps.map((d,i)=><div key={d.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:"1px solid var(--border)"}}><div style={{width:20,height:20,borderRadius:"50%",background:"var(--primary)",color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:12.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.companyName}</div><div style={{fontSize:11,color:"var(--text-3)"}}>{d.stage} · {fmt$Short(d.askingPrice)}</div></div><div style={{fontFamily:"DM Mono,monospace",fontWeight:700,fontSize:14,color:"var(--primary)"}}>{d.overallDealScore}/10</div></div>)}</div>
      <div className="card"><div className="card-title">💰 Financeability</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <div className="fin-card fin-card-green"><div className="fin-card-cnt" style={{color:"#16a34a"}}>{finGood.length}</div><div className="fin-card-lbl" style={{color:"#16a34a"}}>Financeable</div></div>
          <div className="fin-card fin-card-amber"><div className="fin-card-cnt" style={{color:"#d97706"}}>{finBorder.length}</div><div className="fin-card-lbl" style={{color:"#d97706"}}>Borderline</div></div>
          <div className="fin-card fin-card-red"><div className="fin-card-cnt" style={{color:"#dc2626"}}>{finBad.length}</div><div className="fin-card-lbl" style={{color:"#dc2626"}}>Not Fin.</div></div>
        </div>
        <div className="stat-row"><span className="stat-label">Deals w/ data</span><span className="stat-value">{fin.length}</span></div>
        {finGood.length>0&&<div className="stat-row"><span className="stat-label">Cash needed (top 3)</span><span className="stat-value">{fmt$Short(finGood.slice(0,3).reduce((s,d)=>s+(d.totalCashNeeded||0),0))}</span></div>}
      </div>
      <div className="card"><div className="card-title">📡 Source Performance</div>{sources.length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No sourcing data.</div>:sources.map(([src,v])=>{const maxT=Math.max(...sources.map(s=>s[1].total));const avg=v.scores.length?(v.scores.reduce((a,b)=>a+b,0)/v.scores.length).toFixed(1):null;return(<div key={src} style={{marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12.5,fontWeight:600}}>{src}</span><span style={{fontSize:11,color:"var(--text-3)",fontFamily:"DM Mono,monospace"}}>{v.total}{avg?` · ★${avg}`:""}</span></div><div className="prog-bar"><div className="prog-fill" style={{width:`${v.total/maxT*100}%`,background:"var(--primary)"}}/></div></div>);})}</div>
    </div>
    <div className="dash-row dash-row-3">
      <div className="card"><div className="card-title">⏱ Stage Aging</div>{stageAging.length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No stage data.</div>:stageAging.map(({stage,count,avgDays})=><div key={stage} className="stat-row"><div><div style={{fontSize:13,fontWeight:600}}>{stage}</div><div style={{fontSize:11,color:"var(--text-3)"}}>{count} deals</div></div>{avgDays!=null?<span style={{fontFamily:"DM Mono,monospace",fontSize:13,color:avgDays>30?"#dc2626":avgDays>14?"#d97706":"var(--text)"}}>{avgDays}d avg</span>:<span style={{color:"var(--text-3)",fontSize:12}}>no data</span>}</div>)}</div>
      <div className="card"><div className="card-title">🚩 Red Flag Monitor</div>{redFlags.length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No red flags recorded.</div>:redFlags.map(d=><div key={d.id} className="stat-row"><div><div style={{fontSize:13,fontWeight:600}}>{d.companyName}</div><div style={{fontSize:11,color:"var(--text-3)"}}>{d.stage}</div></div><div style={{fontFamily:"DM Mono,monospace",fontWeight:700,color:"#dc2626",fontSize:14}}>{d.redFlagCount} flags</div></div>)}</div>
      <div className="card"><div className="card-title">📐 Valuation Snapshot</div>
        <div className="stat-row"><span className="stat-label">Median EBITDA multiple</span><span className="stat-value">{medEbitda?medEbitda.toFixed(1)+"x":"—"}</span></div>
        <div className="stat-row"><span className="stat-label">Median SDE multiple</span><span className="stat-value">{median(active.filter(d=>d.apToSde).map(d=>parseFloat(d.apToSde)))?median(active.filter(d=>d.apToSde).map(d=>parseFloat(d.apToSde))).toFixed(1)+"x":"—"}</span></div>
        <div className="stat-row"><span className="stat-label">Deals with valuation data</span><span className="stat-value">{apEbitdas.length}</span></div>
        <div className="stat-row"><span className="stat-label">Avg asking (active)</span><span className="stat-value">{active.filter(d=>d.askingPrice).length?fmt$(active.filter(d=>d.askingPrice).reduce((s,d)=>s+(parseFloat(d.askingPrice)||0),0)/active.filter(d=>d.askingPrice).length):"—"}</span></div>
      </div>
    </div>
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   PIPELINE
═══════════════════════════════════════════════════════════════ */
const SAVED_VIEWS=[
  {id:"all",label:"All Active",filter:d=>d.status==="Active"},
  {id:"action",label:"Needs Action",filter:d=>{const t=todayStr();return d.status==="Active"&&((d.nextStepDueDate&&d.nextStepDueDate<t)||(d.lastActivityDate&&daysSince(d.lastActivityDate)>=14));}},
  {id:"stale",label:"Stale",filter:d=>d.status==="Active"&&d.lastActivityDate&&daysSince(d.lastActivityDate)>=30},
  {id:"loi",label:"Under LOI",filter:d=>d.loiSubmitted&&!["Dead","Closed"].includes(d.status)},
  {id:"dd",label:"Due Diligence",filter:d=>d.stage==="Due Diligence"},
  {id:"financing",label:"Financing",filter:d=>d.stage==="Financing"},
  {id:"dead",label:"Dead Deals",filter:d=>d.status==="Dead"},
  {id:"closed",label:"Closed",filter:d=>d.status==="Closed"},
];

function Pipeline({deals,setDeals,contacts,setContacts,customFields,toast,setTasks,tasks,buyBox,users,isAdmin,currentUser}){
  const[view,setView]=useState("table");const[modal,setModal]=useState(null);const[confirm,setConfirm]=useState(null);
  const[search,setSearch]=useState("");const[stageF,setStageF]=useState("All");const[statusF,setStatusF]=useState("Active");const[sourceF,setSourceF]=useState("All");
  const[savedView,setSavedView]=useState("all");const[sortKey,setSortKey]=useState("dateAdded");const[sortDir,setSortDir]=useState(-1);
  const[taskPrefill,setTaskPrefill]=useState(null);

  useEffect(()=>{
    const openId=localStorage.getItem("bba_import_open");
    if(openId){localStorage.removeItem("bba_import_open");const found=deals.find(d=>d.id===openId);if(found)setModal(found);}
  },[]);

  const doSave=async form=>{
    const{_isNew,...clean}=form;const now=todayStr();
    if(clean.loiSubmitted&&!clean.loiSubmittedDate)clean.loiSubmittedDate=now;
    if(clean.loiAccepted&&!clean.loiAcceptedDate)clean.loiAcceptedDate=now;
    if(clean.status==="Dead"&&!clean.deadDate)clean.deadDate=now;
    if(clean.status==="Closed"&&!clean.closedDate)clean.closedDate=now;
    if(clean.contactName||clean.contactEmail){
      const r=upsertContactList(contacts,{name:clean.contactName,title:clean.contactTitle,email:clean.contactEmail,phone:clean.contactPhone,company:clean.companyName});
      if(r.added||r.updated){
        try{await DB.upsertContact(objToRow(r.obj));setContacts(r.contacts);if(r.added)toast(`Contact "${r.name}" added`,"success");}catch(e){console.warn("Contact sync:",e);}
      }
    }
    try{
      if(_isNew||modal==="add"){
        // ensure creator is always in assignees so they retain visibility
        const assignees=clean.assignees||[];
        if(!isAdmin&&currentUser?.email&&!assignees.map(e=>e.toLowerCase()).includes(currentUser.email.toLowerCase())){
          clean.assignees=[...assignees,currentUser.email];
        }
        const r={...clean,id:clean.id||genId("LD"),createdAt:now,updatedAt:now};
        await DB.upsertDeal(objToRow(r));
        setDeals(p=>[...p,r]);toast("Deal added","success");
      }else{
        const r={...modal,...clean,updatedAt:now};
        await DB.upsertDeal(objToRow(r));
        setDeals(p=>p.map(d=>d.id===modal.id?r:d));toast("Deal updated","success");
      }
      setModal(null);
    }catch(e){toast("Save failed: "+e.message,"error");}
  };
  const doDel=async id=>{
    try{await DB.deleteDeal(id);setDeals(p=>p.filter(d=>d.id!==id));try{localStorage.removeItem(`bba_files_${id}`);}catch{}toast("Deal deleted","success");setConfirm(null);setModal(null);}
    catch(e){toast("Delete failed: "+e.message,"error");}
  };
  const move=async(id,stage)=>{
    const deal=deals.find(d=>d.id===id);if(!deal)return;
    const upd={...deal,stage,stageEntryDate:todayStr(),...(stage==="Dead"?{status:"Dead",deadDate:todayStr()}:{})};
    try{await DB.upsertDeal(objToRow(upd));setDeals(p=>p.map(d=>d.id===id?upd:d));}catch(e){toast("Update failed","error");}
  };
  const handleAddTask=dealForm=>{setModal(null);setTaskPrefill({relatedDeal:dealForm.companyName||"",company:dealForm.companyName||"",relatedContact:dealForm.contactName||"",_prefill:true});};
  const saveTask=async form=>{
    const{_prefill,...clean}=form;
    if(clean.relatedContact||clean.contactEmail){
      const r=upsertContactList(contacts,{name:clean.relatedContact,email:clean.contactEmail,phone:clean.contactPhone,company:clean.company});
      if(r.added){try{await DB.upsertContact(objToRow(r.obj));setContacts(r.contacts);toast(`Contact "${r.name}" added`,"success");}catch(e){}}
    }
    const t={...clean,id:genId("TK")};
    try{await DB.upsertTask(objToRow(t));setTasks(p=>[...p,t]);toast("Task added","success");setTaskPrefill(null);}
    catch(e){toast("Task save failed: "+e.message,"error");}
  };
  const handleSort=key=>{if(sortKey===key)setSortDir(d=>d*-1);else{setSortKey(key);setSortDir(-1);}};
  const svFilter=SAVED_VIEWS.find(v=>v.id===savedView)?.filter||(d=>true);
  const cDeals=deals.map(computeDeal);
  let filtered=cDeals.filter(svFilter).filter(d=>{
    const q=search.toLowerCase();
    const mQ=!q||[d.companyName,d.industry,d.leadSource,d.brokerName,d.geographyState].join(" ").toLowerCase().includes(q);
    const stageOk=stageF==="All"||d.stage===stageF;
    const sourceOk=sourceF==="All"||d.leadSource===sourceF;
    // only apply the status dropdown on the "all" view — all other saved views handle their own status filtering
    const statusOk=savedView!=="all"||(statusF==="All"||d.status===statusF);
    return mQ&&stageOk&&sourceOk&&statusOk;
  });
  filtered=[...filtered].sort((a,b)=>{const av=a[sortKey]||"";const bv=b[sortKey]||"";if(!isNaN(parseFloat(av)))return(parseFloat(av)-parseFloat(bv))*sortDir;return String(av).localeCompare(String(bv))*sortDir;});
  const isNew=modal==="add"||modal?._isNew;
  const bbMap=buyBox&&Object.keys(buyBox).filter(k=>buyBox[k]&&buyBox[k]!==false&&buyBox[k]!=="").length?cDeals.reduce((m,d)=>{m[d.id]=matchBuyBox(d,buyBox);return m;},{}):null;

  // task status per deal: "overdue" | "none" | "ok"
  const getDealTaskStatus=dealId=>{
    const deal=cDeals.find(d=>d.id===dealId);if(!deal)return"none";
    const dealTasks=tasks.filter(t=>t.status!=="Completed"&&(t.relatedDeal===deal.companyName||(deal.contactName&&t.relatedContact===deal.contactName)));
    if(!dealTasks.length)return"none";
    if(dealTasks.some(t=>isOD(t.dueDate,t.status)))return"overdue";
    return"ok";
  };
  // check if deal has files
  const hasFiles=dealId=>{try{const f=JSON.parse(localStorage.getItem(`bba_files_${dealId}`)||"[]");return f.length>0;}catch{return false;}};
  // color for table row company name
  const getDealNameColor=dealId=>{const s=getDealTaskStatus(dealId);if(s==="none")return"#dc2626";if(s==="overdue")return"#F15C2B";return"var(--text)";};

  return(<div>
    <div className="saved-views">{SAVED_VIEWS.map(v=><div key={v.id} className={`view-chip ${savedView===v.id?"active":""}`} onClick={()=>setSavedView(v.id)}>{v.label}</div>)}</div>
    <div className="stage-tiles">{STAGES.map(s=>{const sl=deals.filter(d=>d.stage===s&&d.status==="Active");const tot=sl.reduce((x,d)=>x+(parseFloat(d.askingPrice)||0),0);return(<div key={s} className="stage-tile"><div className="stage-tile-lbl">{s}</div><div className="stage-tile-cnt">{sl.length}</div><div className="stage-tile-val">{fmt$Short(tot)}</div></div>);})}</div>
    <div className="search-bar">
      <div className="search-wrap"><SearchBox className="inp" placeholder="Search deals…" value={search} onChange={v=>setSearch(v)}/></div>
      <select className="fsel" value={stageF} onChange={e=>setStageF(e.target.value)}><option value="All">All Stages</option>{STAGES.map(s=><option key={s}>{s}</option>)}</select>
      <select className="fsel" value={statusF} onChange={e=>setStatusF(e.target.value)}><option value="All">All Status</option>{["Active","Closed","Dead","Paused"].map(s=><option key={s}>{s}</option>)}</select>
      <select className="fsel" value={sourceF} onChange={e=>setSourceF(e.target.value)}><option value="All">All Sources</option>{LEAD_SOURCES.map(s=><option key={s}>{s}</option>)}</select>
      <div style={{marginLeft:"auto",display:"flex",gap:6}}>
        <button className={`btn ${view==="table"?"btn-primary":"btn-secondary"}`} onClick={()=>setView("table")} title="Table"><Ic.Table/></button>
        <button className={`btn ${view==="kanban"?"btn-primary":"btn-secondary"}`} onClick={()=>setView("kanban")} title="Kanban"><Ic.Kanban/></button>
        <button className="btn btn-primary" onClick={()=>setModal("add")}><Ic.Plus/> Add Deal</button>
      </div>
    </div>
    {view==="table"?(
      <div className="card" style={{padding:0}}>
        <div className="table-wrap">
          <table>
            <thead><tr>{[["id","Deal ID"],["companyName","Company"],["stage","Stage"],["askingPrice","Asking"],["annualRevenue","Revenue"],["ebitdaReported","EBITDA"],["apToEbitda","x EBITDA"],["dscr","DSCR"],["overallDealScore","Score"],["financeabilityStatus","Fin."],["leadSource","Source"],["lastActivityDate","Last Activity"],["deadReason","Dead Reason"]].map(([k,lbl])=><th key={k} onClick={()=>handleSort(k)}>{lbl}{sortKey===k?sortDir>0?" ↑":" ↓":""}</th>)}<th>Actions</th></tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan="14" style={{textAlign:"center",padding:"40px",color:"var(--text-3)"}}>No deals match this view.</td></tr>
              :filtered.map(d=>(
                <tr key={d.id} onClick={()=>setModal(d)}>
                  <td><div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--text-3)",whiteSpace:"nowrap"}}>{d.id}</div></td>
                  <td><div style={{fontWeight:600,color:getDealNameColor(d.id)}}>{d.companyName}</div>{d.dealVerdict&&<div style={{fontSize:10.5,color:"var(--text-3)"}}>{d.dealVerdict}</div>}{bbMap&&bbMap[d.id]&&<span style={{fontSize:10,fontWeight:700,color:bbMap[d.id].status==="Exact Match"?"#16a34a":bbMap[d.id].status==="Partial Match"?"#d97706":"#dc2626",background:bbMap[d.id].status==="Exact Match"?"#f0fdf4":bbMap[d.id].status==="Partial Match"?"#fffbeb":"#fef2f2",padding:"1px 6px",borderRadius:20,display:"inline-block",marginTop:2}}>{bbMap[d.id].status}</span>}</td>
                  <td><Badge color={STAGE_COLOR[d.stage]||"gray"}>{d.stage}</Badge></td>
                  <td style={{fontFamily:"DM Mono,monospace"}}>{d.askingPrice?fmt$(d.askingPrice):"—"}</td>
                  <td style={{fontFamily:"DM Mono,monospace"}}>{d.annualRevenue?fmt$(d.annualRevenue):"—"}</td>
                  <td style={{fontFamily:"DM Mono,monospace"}}>{d.ebitdaReported?fmt$(d.ebitdaReported):"—"}</td>
                  <td style={{fontFamily:"DM Mono,monospace"}}>{d.apToEbitda?d.apToEbitda+"x":"—"}</td>
                  <td style={{fontFamily:"DM Mono,monospace",color:d.dscr?(parseFloat(d.dscr)>=1.25?"#16a34a":parseFloat(d.dscr)>=1.10?"#d97706":"#dc2626"):"var(--text-3)"}}>{d.dscr?d.dscr+"x":"—"}</td>
                  <td><span style={{fontFamily:"DM Mono,monospace",fontWeight:700,color:"var(--primary)"}}>{d.overallDealScore||"—"}</span></td>
                  <td>{d.financeabilityStatus?<span style={{fontSize:11,fontWeight:600,color:d.financeabilityStatus==="Financeable"?"#16a34a":d.financeabilityStatus==="Borderline"?"#d97706":"#dc2626"}}>{d.financeabilityStatus}</span>:"—"}</td>
                  <td>{d.leadSource||"—"}</td>
                  <td style={{fontSize:12,color:d.lastActivityDate&&daysSince(d.lastActivityDate)>=30?"#dc2626":"var(--text-2)"}}>{fmtD(d.lastActivityDate)}</td>
                  <td style={{fontSize:12,color:"var(--text-2)",maxWidth:110}}>{d.deadReason||"—"}</td>
                  <td onClick={e=>e.stopPropagation()}><div style={{display:"flex",gap:3}}><button className="btn btn-ghost btn-icon btn-sm" onClick={()=>setModal(d)}><Ic.Edit/></button><button className="btn btn-ghost btn-icon btn-sm" style={{color:"#EF4444"}} onClick={()=>setConfirm(d.id)}><Ic.Trash/></button></div></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    ):(
      <div className="kanban-wrap">
        {STAGES.map(stage=>{const sl=filtered.filter(d=>d.stage===stage);return(
          <div key={stage} className="kanban-col" onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add("drag-over");}} onDragLeave={e=>e.currentTarget.classList.remove("drag-over")} onDrop={e=>{e.currentTarget.classList.remove("drag-over");const id=e.dataTransfer.getData("id");if(id)move(id,stage);}}>
            <div className="kanban-col-hdr"><div><div className="kanban-col-title">{stage}</div><div className="kanban-col-meta">{sl.length} · {fmt$Short(sl.reduce((s,d)=>s+(parseFloat(d.askingPrice)||0),0))}</div></div></div>
            <div className="kanban-cards">{sl.map(d=>{const ts=getDealTaskStatus(d.id);const fls=hasFiles(d.id);const borderColor=ts==="none"?"#FCA5A5":ts==="overdue"?"#F15C2B":"var(--border)";const nameColor=ts==="none"?"#dc2626":ts==="overdue"?"#F15C2B":"var(--text)";return(<div key={d.id} className="kanban-card" draggable onDragStart={e=>e.dataTransfer.setData("id",d.id)} onClick={()=>setModal(d)} style={{borderColor}}><div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:4}}><div className="kanban-card-co" style={{color:nameColor,flex:1}}>{d.companyName}</div>{fls&&<span title="Has files attached" style={{fontSize:12,flexShrink:0,color:"var(--text-3)"}}>📎</span>}</div><div className="kanban-card-sub">{d.leadSource||"—"} · {d.industry||"—"}</div>{d.overallDealScore&&<div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--primary)",fontWeight:700}}>★ {d.overallDealScore}</div>}<div className="kanban-card-foot"><div className="kanban-card-val">{d.askingPrice?fmt$Short(d.askingPrice):"No price"}</div>{d.financeabilityStatus&&<span style={{fontSize:10,fontWeight:600,color:d.financeabilityStatus==="Financeable"?"#16a34a":d.financeabilityStatus==="Borderline"?"#d97706":"#dc2626"}}>{d.financeabilityStatus==="Financeable"?"✓":"~"}</span>}</div></div>);})}</div>
          </div>
        );})}
      </div>
    )}
    {modal&&<DealForm deal={isNew?(modal==="add"?{...DEAL_DEFAULTS,_isNew:true}:modal):modal} customFields={customFields} onClose={()=>setModal(null)} onSave={doSave} onAddTask={handleAddTask} onDelete={id=>{if(window.confirm("Permanently delete this deal?"))doDel(id);}} tasks={tasks} onOpenTask={t=>{setModal(null);setTaskPrefill(t);}} users={users}/>}
    {taskPrefill&&<TaskForm task={taskPrefill} customFields={customFields} onClose={()=>setTaskPrefill(null)} onSave={saveTask} onCompleteAndNew={form=>{saveTask({...form,status:"Completed"});setTaskPrefill({owner:form.owner||"",relatedContact:form.relatedContact||"",contactEmail:form.contactEmail||"",contactPhone:form.contactPhone||"",company:form.company||"",relatedDeal:form.relatedDeal||"",status:"Open",title:"",taskType:"Follow-Up Call",dueDate:"",priority:"Medium",notes:"",customValues:{},_prefill:true});}} onOpenDeal={d=>{setTaskPrefill(null);setModal(d);}} contacts={contacts} deals={deals} users={users}/>}
    {confirm&&<Confirm msg="Delete this deal?" onConfirm={()=>doDel(confirm)} onCancel={()=>setConfirm(null)}/>}
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   CONTACTS
═══════════════════════════════════════════════════════════════ */
const CT_TYPES=["Client","Prospect","Partner","Referral","Vendor","Alumni","Other"];
const CT_STATUSES=["Active","Warm","Cold","Unqualified","Archived"];
function ContactForm({contact,customFields,onClose,onSave,users}){
  const def={firstName:"",lastName:"",company:"",title:"",email:"",phone:"",contactType:"Prospect",source:"",status:"Active",owner:"",lastContacted:"",notes:"",customValues:{},assignees:[]};
  const[form,setForm]=useState({...def,...contact,customValues:{...(contact?.customValues||{})},assignees:contact?.assignees||[]});
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));const setCF=(id,val)=>setForm(p=>({...p,customValues:{...p.customValues,[id]:val}}));
  return(<div className="overlay" onMouseDown={e=>{if(e.target===e.currentTarget)e.preventDefault();}}><div className="modal wide">
    <div className="modal-hdr"><div className="modal-title">{contact?"Edit Contact":"Add Contact"}</div><button className="btn btn-ghost btn-icon" onClick={onClose}><Ic.X/></button></div>
    <div className="modal-body"><div className="form-grid">
      <div className="fg"><label className="form-label">First Name *</label><NoFillInput className="form-input" value={form.firstName} onChange={f("firstName")}/></div>
      <div className="fg"><label className="form-label">Last Name *</label><NoFillInput className="form-input" value={form.lastName} onChange={f("lastName")}/></div>
      <div className="fg"><label className="form-label">Company</label><NoFillInput className="form-input" value={form.company} onChange={f("company")}/></div>
      <div className="fg"><label className="form-label">Title / Role</label><NoFillInput className="form-input" value={form.title} onChange={f("title")}/></div>
      <div className="fg"><label className="form-label">Email</label><NoFillInput className="form-input" value={form.email} onChange={f("email")}/></div>
      <div className="fg"><label className="form-label">Phone</label><NoFillInput className="form-input" value={form.phone} onChange={f("phone")}/></div>
      <div className="fg"><label className="form-label">Type</label><select className="form-select" value={form.contactType} onChange={f("contactType")}>{CT_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
      <div className="fg"><label className="form-label">Status</label><select className="form-select" value={form.status} onChange={f("status")}>{CT_STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
      <div className="fg"><label className="form-label">Source</label><NoFillInput className="form-input" value={form.source} onChange={f("source")}/></div>
      <div className="fg"><label className="form-label">Last Contacted</label><NoFillInput className="form-input" type="date" value={form.lastContacted} onChange={f("lastContacted")}/></div>
      <div className="fg"><label className="form-label">Assignees</label><MultiSelect values={form.assignees||[]} onChange={v=>setForm(p=>({...p,assignees:v}))} users={users}/></div>
      <div className="fg full"><label className="form-label">Notes</label><textarea className="form-textarea" value={form.notes} onChange={f("notes")}/></div>
    </div><CustomFieldInputs entityType="Contacts" customFields={customFields} values={form.customValues} onChange={setCF}/></div>

function Contacts({contacts,setContacts,deals,customFields,toast,setSection,users,isAdmin,currentUser}){

  const[modal,setModal]=useState(null);const[confirm,setConfirm]=useState(null);
  const[sortKey,setSortKey]=useState("firstName");const[sortDir,setSortDir]=useState(1);

  const SortTh=({label,k,style})=><th style={style} onClick={()=>handleSort(k)}>{label}{sortKey===k?sortDir>0?" ↑":" ↓":""}</th>;

    else{av=(a[sortKey]||"").toLowerCase();bv=(b[sortKey]||"").toLowerCase();}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  const doSave=async form=>{
    try{

      <tbody>{sorted.length===0?<tr><td colSpan="9" style={{textAlign:"center",padding:"40px",color:"var(--text-3)"}}>No contacts found.</td></tr>:sorted.map(c=>(
        <tr key={c.id} onClick={()=>setModal(c)}>

          <td>{c.company}</td><td>{c.title}</td>

          <td onClick={e=>e.stopPropagation()}><div style={{display:"flex",gap:5,flexWrap:"nowrap"}}><button className="btn btn-success btn-sm" onClick={()=>createDeal(c)}><Ic.Deal/> Deal</button><button className="btn btn-secondary btn-sm" onClick={()=>createTask(c)}><Ic.Tasks/> Task</button><button className="btn btn-ghost btn-icon btn-sm" style={{color:"#EF4444"}} onClick={()=>setConfirm(c.id)}><Ic.Trash/></button></div></td>

function TaskForm({task,customFields,onClose,onSave,onDelete,onComplete,onCompleteAndNew,onOpenDeal,contacts,deals,users}){
  const def={title:"",taskType:"Follow-Up Call",relatedContact:"",contactEmail:"",contactPhone:"",company:"",relatedDeal:"",dueDate:"",priority:"Medium",status:"Open",owner:"",notes:"",customValues:{},assignees:[]};
  const[form,setForm]=useState({...def,...task,customValues:{...(task?.customValues||{})},assignees:task?.assignees||[]});
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const cNames=[...new Set(contacts.map(c=>`${c.firstName} ${c.lastName}`.trim()).filter(Boolean))].sort();
  const cos=[...new Set([...contacts.map(c=>c.company),...deals.map(d=>d.companyName)].filter(Boolean))].sort();
  const dNames=[...new Set(deals.map(d=>d.companyName).filter(Boolean))].sort();

  // on mount: if task has a relatedContact but missing email/phone, look them up and backfill
  useEffect(()=>{
    if(form.relatedContact&&(!form.contactEmail||!form.contactPhone)){
      const match=contacts.find(c=>`${c.firstName} ${c.lastName}`.trim()===form.relatedContact);
      if(match){
        setForm(p=>({
          ...p,
          contactEmail:p.contactEmail||match.email||"",
          contactPhone:p.contactPhone||match.phone||"",
        }));
      }
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);// run once on open only
  const handleContactChange=v=>{
    const match=contacts.find(c=>`${c.firstName} ${c.lastName}`.trim()===v);
    if(match){
      // always overwrite email and phone from the contact record when a contact is selected
      setForm(p=>({...p,relatedContact:v,contactEmail:match.email||"",contactPhone:match.phone||""}));
    }else{
      setForm(p=>({...p,relatedContact:v}));
    }

  const relatedDealObj=form.relatedDeal?deals.find(d=>d.companyName===form.relatedDeal):null;

        <div className="fg"><label className="form-label">Related Contact</label><Combobox value={form.relatedContact} onChange={handleContactChange} options={cNames}/></div>
        <div className="fg"><label className="form-label">Contact Email</label><NoFillInput className="form-input" value={form.contactEmail||""} onChange={f("contactEmail")} placeholder="Auto-filled from contact"/></div>
        <div className="fg"><label className="form-label">Contact Phone</label><NoFillInput className="form-input" value={form.contactPhone||""} onChange={f("contactPhone")} placeholder="Auto-filled from contact"/></div>
        <div className="fg"><label className="form-label">Company</label><Combobox value={form.company} onChange={v=>setForm(p=>({...p,company:v}))} options={cos}/></div>
        <div className="fg full">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <label className="form-label">Related Deal</label>
            {relatedDealObj&&onOpenDeal&&(
              <button type="button" className="btn btn-ghost btn-sm" style={{fontSize:11,padding:"2px 8px",color:"var(--primary)",fontWeight:600}} onClick={()=>{onSave(form);onOpenDeal(relatedDealObj);}}>
                🔗 Open: {relatedDealObj.companyName} →
              </button>
            )}
          </div>
          <Combobox value={form.relatedDeal} onChange={v=>setForm(p=>({...p,relatedDeal:v}))} options={dNames}/>
        </div>
        <div className="fg"><label className="form-label">Due Date</label><NoFillInput className="form-input" type="date" value={form.dueDate} onChange={f("dueDate")}/></div>
        <div className="fg"><label className="form-label">Priority</label><select className="form-select" value={form.priority} onChange={f("priority")}>{["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}</select></div>
        <div className="fg"><label className="form-label">Status</label><select className="form-select" value={form.status} onChange={f("status")}>{["Open","In Progress","Completed"].map(s=><option key={s}>{s}</option>)}</select></div>
        <div className="fg full"><label className="form-label">Notes</label><textarea className="form-textarea" value={form.notes} onChange={f("notes")}/></div>

        {!isNew&&onCompleteAndNew&&form.status!=="Completed"&&<button className="btn btn-secondary" style={{color:"#16a34a",borderColor:"#16a34a"}} onClick={()=>onCompleteAndNew(form)}>✓ Complete & Add New</button>}
