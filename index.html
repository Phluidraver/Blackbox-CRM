function Tasks({tasks,setTasks,customFields,toast,contacts,setContacts,deals,setDeals,users,isAdmin,currentUser}){
  const[tab,setTab]=useState("Open");const[modal,setModal]=useState(null);const[confirm,setConfirm]=useState(null);
  const[openDealModal,setOpenDealModal]=useState(null);

  useEffect(()=>{
    const p=localStorage.getItem("bba_task_prefill");
    if(p){try{const d=JSON.parse(p);if(d._prefill){localStorage.removeItem("bba_task_prefill");const{_prefill,...rest}=d;setModal({...rest,_prefill:true});}}catch{}}
  });

  const appendNotesToDeal=async(clean)=>{
    if(!clean.notes||!clean.relatedDeal)return;
    const dealIdx=deals.findIndex(d=>d.companyName===clean.relatedDeal);if(dealIdx<0)return;
    const deal=deals[dealIdx];
    const d=new Date();const mm=String(d.getMonth()+1).padStart(2,"0");const dd=String(d.getDate()).padStart(2,"0");const yy=String(d.getFullYear()).slice(2);
    const stamp=`${mm}/${dd}/${yy}- [Task: ${clean.title}] ${clean.notes}`;
    const updated={...deal,notes:deal.notes?`${stamp}\n\n${deal.notes}`:stamp};
    try{await DB.upsertDeal(objToRow(updated));const newDeals=deals.map((d,i)=>i===dealIdx?updated:d);setDeals(newDeals);}catch(e){console.warn("Notes sync failed:",e);}
  };

  const doSave=async form=>{
    const{_prefill,...clean}=form;
    if(clean.relatedContact||clean.contactEmail){
      const r=upsertContactList(contacts,{name:clean.relatedContact,email:clean.contactEmail,phone:clean.contactPhone,company:clean.company});
      if(r.added){try{await DB.upsertContact(objToRow(r.obj));setContacts(r.contacts);toast(`Contact "${r.name}" added`,"success");}catch{}}
    }
    await appendNotesToDeal(clean);
    try{
      if(modal==="add"||modal?._prefill){
        // ensure creator retains visibility
        const assignees=clean.assignees||[];
        if(!isAdmin&&currentUser?.email&&!assignees.map(e=>e.toLowerCase()).includes(currentUser.email.toLowerCase())){
          clean.assignees=[...assignees,currentUser.email];
        }
        const n={...clean,id:genId("TK")};
        await DB.upsertTask(objToRow(n));setTasks(p=>[...p,n]);toast("Task added","success");
      }else{
        const n={...modal,...clean};await DB.upsertTask(objToRow(n));setTasks(p=>p.map(t=>t.id===modal.id?n:t));toast("Task updated","success");
      }
      setModal(null);
    }catch(e){toast("Save failed: "+e.message,"error");}
  };
  const doDel=async id=>{try{await DB.deleteTask(id);setTasks(p=>p.filter(t=>t.id!==id));toast("Task deleted","success");setConfirm(null);setModal(null);}catch(e){toast("Delete failed","error");}};
  const doComplete=async id=>{
    const t=tasks.find(t=>t.id===id);if(!t)return;
    const upd={...t,status:"Completed"};
    try{await DB.upsertTask(objToRow(upd));setTasks(p=>p.map(t=>t.id===id?upd:t));toast("Task completed","success");setModal(null);}catch(e){toast("Update failed","error");}
  };
  const doCompleteAndNew=async form=>{
    const{_prefill,...clean}=form;
    await appendNotesToDeal(clean);
    const completed={...clean,status:"Completed"};
    try{await DB.upsertTask(objToRow(completed));setTasks(p=>p.map(t=>t.id===clean.id?completed:t));toast("Task completed","success");}catch(e){}
    setModal({owner:clean.owner||"",relatedContact:clean.relatedContact||"",contactEmail:clean.contactEmail||"",contactPhone:clean.contactPhone||"",company:clean.company||"",relatedDeal:clean.relatedDeal||"",status:"Open",title:"",taskType:"Follow-Up Call",dueDate:"",priority:"Medium",notes:"",customValues:{},assignees:clean.assignees||[],_prefill:true});
  };
  const toggle=async task=>{
    const ns=task.status==="Completed"?"Open":"Completed";const upd={...task,status:ns};
    try{await DB.upsertTask(objToRow(upd));setTasks(p=>p.map(t=>t.id===task.id?upd:t));}catch(e){toast("Update failed","error");}
  };
  const odCnt=tasks.filter(t=>isOD(t.dueDate,t.status)).length;
  const[sortKey,setSortKey]=useState("dueDate");const[sortDir,setSortDir]=useState(1);
  const handleSort=key=>{if(sortKey===key)setSortDir(d=>d*-1);else{setSortKey(key);setSortDir(1);}};
  const SortTh=({label,k,style})=><th style={style} onClick={()=>handleSort(k)}>{label}{sortKey===k?sortDir>0?" ↑":" ↓":""}</th>;
  const filtered=tasks.filter(t=>{if(tab==="Open")return t.status!=="Completed"&&!isOD(t.dueDate,t.status);if(tab==="Overdue")return isOD(t.dueDate,t.status);if(tab==="Completed")return t.status==="Completed";return true;});
  const sorted=[...filtered].sort((a,b)=>{
    // overdue always sort to top within the list
    const aO=isOD(a.dueDate,a.status),bO=isOD(b.dueDate,b.status);
    if(sortKey==="dueDate"||sortKey==="priority"){
      // use default priority/overdue sort when sorting by these columns
      if(aO&&!bO)return -1;if(!aO&&bO)return 1;
      if(sortKey==="priority"){const p={High:0,Medium:1,Low:2};return((p[a.priority]||1)-(p[b.priority]||1))*sortDir;}
      const av=a.dueDate||"9999";const bv=b.dueDate||"9999";return av<bv?-sortDir:av>bv?sortDir:0;
    }
    const av=(a[sortKey]||"").toString().toLowerCase();const bv=(b[sortKey]||"").toString().toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div className="tab-bar">{["Open","Overdue","Completed","All"].map(t=><button key={t} className={`tab-btn${tab===t?" active":""}`} onClick={()=>setTab(t)}>{t}{t==="Overdue"&&odCnt>0?` (${odCnt})`:""}</button>)}</div>
      <button className="btn btn-primary" onClick={()=>setModal("add")}><Ic.Plus/> Add Task</button>
    </div>
    <div className="card" style={{padding:0}}><div className="table-wrap"><table><thead><tr><th style={{width:34}}></th><SortTh label="Task" k="title"/><SortTh label="Type" k="taskType"/><SortTh label="Contact" k="relatedContact"/><SortTh label="Company" k="company"/><SortTh label="Deal" k="relatedDeal"/><SortTh label="Due Date" k="dueDate"/><SortTh label="Priority" k="priority"/><SortTh label="Status" k="status"/><th>Actions</th></tr></thead>
      <tbody>{sorted.length===0?<tr><td colSpan="10" style={{textAlign:"center",padding:"40px",color:"var(--text-3)"}}>No tasks in this view.</td></tr>:sorted.map(t=>{const od=isOD(t.dueDate,t.status);return(<tr key={t.id} className={od?"task-overdue":t.status==="Completed"?"task-done":""} style={{cursor:"pointer"}} onClick={()=>setModal(t)}>
        <td onClick={e=>e.stopPropagation()}><div className={`checkbox${t.status==="Completed"?" checked":""}`} onClick={()=>toggle(t)}>{t.status==="Completed"&&<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}</div></td>
        <td><div style={{fontWeight:600}}>{od&&"⚠ "}{t.title}</div>{t.notes&&<div style={{fontSize:11,color:"var(--text-3)",marginTop:1}}>{t.notes.slice(0,50)}{t.notes.length>50?"…":""}</div>}</td>
        <td><Badge color="gray">{t.taskType}</Badge></td>
        <td style={{fontSize:12}}>{t.relatedContact||"—"}</td>
        <td style={{fontSize:12}}>{t.company||"—"}</td>
        <td style={{fontSize:12,maxWidth:110}}>{t.relatedDeal||"—"}</td>
        <td style={{fontFamily:"DM Mono,monospace",fontSize:12}}>{fmtD(t.dueDate)}</td>
        <td><Badge color={t.priority==="High"?"red":t.priority==="Low"?"gray":"amber"}>{t.priority}</Badge></td>
        <td><Badge color={t.status==="Completed"?"green":t.status==="In Progress"?"blue":"gray"}>{t.status}</Badge></td>
        <td onClick={e=>e.stopPropagation()}><div style={{display:"flex",gap:3}}><button className="btn btn-ghost btn-icon btn-sm" onClick={()=>setModal(t)}><Ic.Edit/></button><button className="btn btn-ghost btn-icon btn-sm" style={{color:"#EF4444"}} onClick={()=>setConfirm(t.id)}><Ic.Trash/></button></div></td>
      </tr>);})}</tbody></table></div></div>
    {modal&&<TaskForm task={modal==="add"?null:modal} customFields={customFields} onClose={()=>setModal(null)} onSave={doSave} onDelete={id=>{if(window.confirm("Delete this task?"))doDel(id);}} onComplete={doComplete} onCompleteAndNew={doCompleteAndNew} onOpenDeal={d=>{setModal(null);setOpenDealModal(d);}} contacts={contacts} deals={deals} users={users}/>}
    {openDealModal&&<DealForm deal={openDealModal} customFields={customFields} onClose={()=>setOpenDealModal(null)} onSave={async form=>{const{_isNew,...clean}=form;const now=todayStr();const upd={...openDealModal,...clean,updatedAt:now};try{await DB.upsertDeal(objToRow(upd));setDeals(p=>p.map(d=>d.id===openDealModal.id?upd:d));toast("Deal updated","success");setOpenDealModal(null);}catch(e){toast("Save failed","error");}}} tasks={tasks} onOpenTask={t=>{setOpenDealModal(null);setModal(t);}} users={users}/>}
    {confirm&&<Confirm msg="Delete this task?" onConfirm={()=>doDel(confirm)} onCancel={()=>setConfirm(null)}/>}
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   REPORTS
═══════════════════════════════════════════════════════════════ */
function Reports({deals}){
  const[tab,setTab]=useState("pipeline");
  const cDeals=deals.map(computeDeal);const active=cDeals.filter(d=>d.status==="Active");const dead=cDeals.filter(d=>d.status==="Dead");
  const bystage=STAGES.map(s=>({s,cnt:deals.filter(d=>d.stage===s).length,val:deals.filter(d=>d.stage===s).reduce((x,d)=>x+(parseFloat(d.askingPrice)||0),0)})).filter(x=>x.cnt>0);
  const bySource=LEAD_SOURCES.map(s=>({s,cnt:deals.filter(d=>d.leadSource===s).length,active:active.filter(d=>d.leadSource===s).length,dead:dead.filter(d=>d.leadSource===s).length,loi:deals.filter(d=>d.leadSource===s&&d.loiSubmitted).length,scores:cDeals.filter(d=>d.leadSource===s&&d.overallDealScore).map(d=>parseFloat(d.overallDealScore))})).filter(x=>x.cnt>0).sort((a,b)=>b.cnt-a.cnt);
  const byIndustry=INDUSTRIES.map(s=>({s,cnt:deals.filter(d=>d.industry===s).length})).filter(x=>x.cnt>0).sort((a,b)=>b.cnt-a.cnt);
  const deadByReason=DEAD_REASONS.map(r=>({r,cnt:dead.filter(d=>d.deadReason===r).length})).filter(x=>x.cnt>0).sort((a,b)=>b.cnt-a.cnt);
  const withEbitda=cDeals.filter(d=>d.apToEbitda);const withSde=cDeals.filter(d=>d.apToSde);
  const medEbitda=median(withEbitda.map(d=>parseFloat(d.apToEbitda)));const medSde=median(withSde.map(d=>parseFloat(d.apToSde)));
  const fin=cDeals.filter(d=>d.financeabilityStatus);const finGood=fin.filter(d=>d.financeabilityStatus==="Financeable");const finBorder=fin.filter(d=>d.financeabilityStatus==="Borderline");const finBad=fin.filter(d=>d.financeabilityStatus==="Not Financeable");
  const scored=cDeals.filter(d=>d.overallDealScore).sort((a,b)=>(parseFloat(b.overallDealScore)||0)-(parseFloat(a.overallDealScore)||0));
  const TABS=[{id:"pipeline",label:"Pipeline"},{id:"financial",label:"Financial"},{id:"scoring",label:"Scoring"},{id:"source",label:"Source & Broker"},{id:"diligence",label:"Diligence"},{id:"dead",label:"Dead Deals"},{id:"forecast",label:"Forecast"}];
  const BarRow=({label,value,max,fmtFn=String})=>(<div style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12.5,fontWeight:600}}>{label}</span><span style={{fontSize:12,fontFamily:"DM Mono,monospace",color:"var(--text-2)"}}>{fmtFn(value)}</span></div><div className="prog-bar"><div className="prog-fill" style={{width:`${max?Math.min(value/max*100,100):0}%`,background:"var(--primary)"}}/></div></div>);
  return(<div>
    <div className="tab-bar" style={{marginBottom:20}}>{TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}</div>
    {tab==="pipeline"&&<div><div className="report-grid"><div className="card"><div className="card-title">Deals by Stage</div>{bystage.map(({s,cnt})=><BarRow key={s} label={s} value={cnt} max={Math.max(...bystage.map(x=>x.cnt))} fmtFn={v=>`${v} deals`}/>)}</div><div className="card"><div className="card-title">Pipeline Value by Stage</div>{bystage.map(({s,val})=><BarRow key={s} label={s} value={val} max={Math.max(...bystage.map(x=>x.val))} fmtFn={fmt$Short}/>)}</div></div><div className="report-grid"><div className="card"><div className="card-title">Active Deals by Industry</div>{byIndustry.length?byIndustry.map(({s,cnt})=><BarRow key={s} label={s} value={cnt} max={Math.max(...byIndustry.map(x=>x.cnt))} fmtFn={v=>`${v} deals`}/>):<div style={{color:"var(--text-3)",fontSize:13}}>No data.</div>}</div><div className="card"><div className="card-title">Stage Funnel</div>{bystage.map(({s,cnt},i)=>{const prev=i>0?bystage[i-1].cnt:cnt;const conv=prev?Math.round(cnt/prev*100):100;return(<div key={s} className="stat-row"><span className="stat-label">{s}</span><div style={{display:"flex",gap:8,alignItems:"center"}}><span className="stat-value">{cnt}</span><span style={{fontSize:11,color:"var(--text-3)"}}>{i>0?`(${conv}% from prev)`:""}</span></div></div>);})}</div></div></div>}
    {tab==="financial"&&<div><div className="kpi-grid" style={{gridTemplateColumns:"repeat(4,1fr)",marginBottom:20}}><div className="kpi-card"><div className="kpi-label">Median EBITDA Multiple</div><div className="kpi-value">{medEbitda?medEbitda.toFixed(1)+"x":"—"}</div><div className="kpi-sub">{withEbitda.length} deals</div></div><div className="kpi-card"><div className="kpi-label">Median SDE Multiple</div><div className="kpi-value">{medSde?medSde.toFixed(1)+"x":"—"}</div><div className="kpi-sub">{withSde.length} deals</div></div><div className="kpi-card accent-green"><div className="kpi-label">Financeable Deals</div><div className="kpi-value success">{finGood.length}</div><div className="kpi-sub">{finBorder.length} borderline</div></div><div className="kpi-card accent-blue"><div className="kpi-label">Total Cash Needed</div><div className="kpi-value">{fmt$Short(cDeals.reduce((s,d)=>s+(d.totalCashNeeded||0),0))}</div><div className="kpi-sub">all deals</div></div></div><div className="report-grid"><div className="card"><div className="card-title">Financeability Summary</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}><div className="fin-card fin-card-green"><div className="fin-card-cnt" style={{color:"#16a34a"}}>{finGood.length}</div><div className="fin-card-lbl" style={{color:"#16a34a"}}>Financeable</div></div><div className="fin-card fin-card-amber"><div className="fin-card-cnt" style={{color:"#d97706"}}>{finBorder.length}</div><div className="fin-card-lbl" style={{color:"#d97706"}}>Borderline</div></div><div className="fin-card fin-card-red"><div className="fin-card-cnt" style={{color:"#dc2626"}}>{finBad.length}</div><div className="fin-card-lbl" style={{color:"#dc2626"}}>Not Fin.</div></div></div>{finGood.slice(0,5).map(d=><div key={d.id} className="stat-row"><span className="stat-label">{d.companyName}</span><span className="stat-value" style={{color:"#16a34a"}}>DSCR {d.dscr}x</span></div>)}</div><div className="card"><div className="card-title">EBITDA Multiple Distribution</div>{withEbitda.length===0?<div style={{color:"var(--text-3)",fontSize:13}}>No data yet.</div>:[...withEbitda].sort((a,b)=>parseFloat(a.apToEbitda)-parseFloat(b.apToEbitda)).slice(0,10).map(d=><div key={d.id} className="stat-row"><span className="stat-label">{d.companyName}</span><span className="stat-value">{parseFloat(d.apToEbitda).toFixed(1)}x</span></div>)}</div></div><div className="card"><div className="card-title">Post-Debt Cash Flow (Top Deals)</div><div className="table-wrap"><table><thead><tr><th>Company</th><th>Asking</th><th>Norm. EBITDA</th><th>Debt Svc.</th><th>DSCR</th><th>Post-Debt CF</th><th>Cash to Close</th><th>Status</th></tr></thead><tbody>{cDeals.filter(d=>d.dscr).sort((a,b)=>parseFloat(b.dscr)-parseFloat(a.dscr)).slice(0,10).map(d=><tr key={d.id}><td style={{fontWeight:600}}>{d.companyName}</td><td style={{fontFamily:"DM Mono,monospace"}}>{fmt$(d.askingPrice)}</td><td style={{fontFamily:"DM Mono,monospace"}}>{d.normalizedEbitda?fmt$(d.normalizedEbitda):"—"}</td><td style={{fontFamily:"DM Mono,monospace"}}>{d.annualDebtService?fmt$(d.annualDebtService):"—"}</td><td style={{fontFamily:"DM Mono,monospace",fontWeight:700,color:parseFloat(d.dscr)>=1.25?"#16a34a":parseFloat(d.dscr)>=1.10?"#d97706":"#dc2626"}}>{d.dscr}x</td><td style={{fontFamily:"DM Mono,monospace",color:d.postDebtCashFlow>=0?"#16a34a":"#dc2626"}}>{d.postDebtCashFlow!=null?fmt$(d.postDebtCashFlow):"—"}</td><td style={{fontFamily:"DM Mono,monospace"}}>{d.totalCashNeeded?fmt$(d.totalCashNeeded):"—"}</td><td><span style={{fontSize:11,fontWeight:600,color:d.financeabilityStatus==="Financeable"?"#16a34a":d.financeabilityStatus==="Borderline"?"#d97706":"#dc2626"}}>{d.financeabilityStatus||"—"}</span></td></tr>)}{cDeals.filter(d=>d.dscr).length===0&&<tr><td colSpan="8" style={{textAlign:"center",padding:"30px",color:"var(--text-3)"}}>Enter financing data on deals to see this report.</td></tr>}</tbody></table></div></div></div>}
    {tab==="scoring"&&<div><div className="report-grid"><div className="card"><div className="card-title">Top Scored Deals</div>{scored.length===0?<div style={{color:"var(--text-3)",fontSize:13}}>No scored deals yet.</div>:scored.slice(0,10).map((d,i)=><div key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid var(--border)"}}><span style={{width:20,height:20,borderRadius:"50%",background:"var(--primary)",color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</span><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{d.companyName}</div><div style={{fontSize:11,color:"var(--text-3)"}}>{d.stage} · {d.industry}</div></div><div style={{fontFamily:"DM Mono,monospace",fontWeight:700,fontSize:16,color:"var(--primary)"}}>{d.overallDealScore}</div></div>)}</div><div className="card"><div className="card-title">Verdict Distribution</div>{VERDICTS.map(v=>{const cnt=cDeals.filter(d=>d.dealVerdict===v).length;return cnt>0?<BarRow key={v} label={v} value={cnt} max={Math.max(...VERDICTS.map(x=>cDeals.filter(d=>d.dealVerdict===x).length))} fmtFn={n=>`${n} deals`}/>:null;})}{VERDICTS.every(v=>cDeals.filter(d=>d.dealVerdict===v).length===0)&&<div style={{color:"var(--text-3)",fontSize:13}}>No verdicts yet.</div>}</div></div></div>}
    {tab==="source"&&<div><div className="card"><div className="card-title">Source Performance</div><div className="table-wrap"><table><thead><tr><th>Source</th><th>Total</th><th>Active</th><th>Dead</th><th>LOI Rate</th><th>Avg Score</th></tr></thead><tbody>{bySource.map(({s,cnt,active:ac,dead:dc,loi,scores})=><tr key={s}><td style={{fontWeight:600}}>{s}</td><td style={{fontFamily:"DM Mono,monospace"}}>{cnt}</td><td style={{fontFamily:"DM Mono,monospace",color:"#16a34a"}}>{ac}</td><td style={{fontFamily:"DM Mono,monospace",color:"#dc2626"}}>{dc}</td><td style={{fontFamily:"DM Mono,monospace"}}>{cnt?Math.round(loi/cnt*100)+"%":"—"}</td><td style={{fontFamily:"DM Mono,monospace",color:"var(--primary)"}}>{scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):"—"}</td></tr>)}{bySource.length===0&&<tr><td colSpan="6" style={{textAlign:"center",padding:"30px",color:"var(--text-3)"}}>No source data.</td></tr>}</tbody></table></div></div></div>}
    {tab==="diligence"&&<div><div className="report-grid"><div className="card"><div className="card-title">Diligence Completion</div>{STAGES.slice(3,8).map(s=>{const sl=active.filter(d=>d.stage===s);const avg=sl.length?Math.round(sl.map(computeDeal).reduce((a,d)=>a+(d.diligenceCompletionPct||0),0)/sl.length):null;return sl.length?<div key={s} className="stat-row"><span className="stat-label">{s}</span><span className="stat-value">{avg!=null?`${avg}%`:"—"}</span></div>:null;})}{active.filter(d=>["Due Diligence","Financing","LOI Accepted"].includes(d.stage)).length===0&&<div style={{fontSize:13,color:"var(--text-3)"}}>No late-stage deals yet.</div>}</div><div className="card"><div className="card-title">Document Completion by Deal</div>{active.filter(d=>d.stage==="Due Diligence"||d.stage==="Financing").length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No deals in due diligence or financing.</div>:active.filter(d=>["Due Diligence","Financing"].includes(d.stage)).map(d=>{const cp=computeDeal(d);return(<div key={d.id} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12.5,fontWeight:600}}>{d.companyName}</span><span style={{fontFamily:"DM Mono,monospace",fontSize:12}}>{cp.diligenceCompletionPct}%</span></div><div className="prog-bar"><div className="prog-fill" style={{width:`${cp.diligenceCompletionPct}%`,background:cp.diligenceCompletionPct===100?"#22C55E":cp.diligenceCompletionPct>50?"#F59E0B":"#EF4444"}}/></div></div>);})}</div></div></div>}
    {tab==="dead"&&<div><div className="report-grid"><div className="card"><div className="card-title">Dead Deals by Reason</div>{deadByReason.length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No dead deals.</div>:deadByReason.map(({r,cnt})=><BarRow key={r} label={r} value={cnt} max={Math.max(...deadByReason.map(x=>x.cnt))} fmtFn={v=>`${v} deals`}/>)}</div><div className="card"><div className="card-title">Dead Deal Log</div>{dead.length===0?<div style={{fontSize:13,color:"var(--text-3)"}}>No dead deals.</div>:dead.slice(0,10).map(d=><div key={d.id} className="stat-row"><div><div style={{fontWeight:600,fontSize:13}}>{d.companyName}</div><div style={{fontSize:11,color:"var(--text-3)"}}>{d.deadReason||"No reason given"}</div></div><span style={{fontSize:12,color:"var(--text-3)"}}>{fmtD(d.deadDate)}</span></div>)}</div></div></div>}
    {tab==="forecast"&&<div><div className="kpi-grid" style={{gridTemplateColumns:"repeat(3,1fr)",marginBottom:20}}><div className="kpi-card"><div className="kpi-label">Weighted Pipeline</div><div className="kpi-value">{fmt$Short(active.filter(d=>d.closeProbabilityPct).reduce((s,d)=>s+(parseFloat(d.askingPrice)||0)*(parseFloat(d.closeProbabilityPct)||0)/100,0))}</div><div className="kpi-sub">{active.filter(d=>d.closeProbabilityPct).length} deals w/ probability</div></div><div className="kpi-card accent-green"><div className="kpi-label">Likely to Close (50%+)</div><div className="kpi-value success">{active.filter(d=>parseFloat(d.closeProbabilityPct)>=50).length}</div><div className="kpi-sub">{fmt$Short(active.filter(d=>parseFloat(d.closeProbabilityPct)>=50).reduce((s,d)=>s+(parseFloat(d.askingPrice)||0),0))} total</div></div><div className="kpi-card accent-amber"><div className="kpi-label">Avg Close Probability</div><div className="kpi-value">{(()=>{const d=active.filter(d=>d.closeProbabilityPct);return d.length?Math.round(d.reduce((s,d)=>s+parseFloat(d.closeProbabilityPct||0),0)/d.length)+"%":"—";})()}</div><div className="kpi-sub">active deals</div></div></div><div className="card"><div className="card-title">Forecast by Deal</div><div className="table-wrap"><table><thead><tr><th>Company</th><th>Stage</th><th>Asking Price</th><th>Close Prob.</th><th>Weighted Value</th><th>Est. Close</th></tr></thead><tbody>{active.filter(d=>d.closeProbabilityPct).sort((a,b)=>parseFloat(b.closeProbabilityPct)-parseFloat(a.closeProbabilityPct)).map(d=><tr key={d.id}><td style={{fontWeight:600}}>{d.companyName}</td><td><Badge color={STAGE_COLOR[d.stage]||"gray"}>{d.stage}</Badge></td><td style={{fontFamily:"DM Mono,monospace"}}>{fmt$(d.askingPrice)}</td><td style={{fontFamily:"DM Mono,monospace",color:parseFloat(d.closeProbabilityPct)>=70?"#16a34a":parseFloat(d.closeProbabilityPct)>=40?"#d97706":"#dc2626"}}>{parseFloat(d.closeProbabilityPct).toFixed(1)}%</td><td style={{fontFamily:"DM Mono,monospace",color:"var(--primary)",fontWeight:600}}>{fmt$((parseFloat(d.askingPrice)||0)*(parseFloat(d.closeProbabilityPct)||0)/100)}</td><td style={{fontSize:12}}>{fmtD(d.estimatedCloseDate)}</td></tr>)}{active.filter(d=>d.closeProbabilityPct).length===0&&<tr><td colSpan="6" style={{textAlign:"center",padding:"30px",color:"var(--text-3)"}}>Add close probability to deals to see forecast.</td></tr>}</tbody></table></div></div></div>}
  </div>);
}

/* ═══════════════════════════════════════════════════════════════
   EMAIL TEMPLATES
═══════════════════════════════════════════════════════════════ */
const TEMPLATES=[
  {name:"Initial Outreach",tags:["[SELLER_NAME]","[COMPANY_NAME]","[YOUR_NAME]"],subject:"Inquiry Regarding [COMPANY_NAME]",body:`Dear [SELLER_NAME],\n\nI hope this message finds you well. My name is [YOUR_NAME], and I represent a private investment group focused on acquiring established businesses in your sector.\n\nWe came across [COMPANY_NAME] and were impressed by what you've built. If you've ever considered a transition or partial exit, we'd love to have a confidential conversation.\n\nOur process is straightforward: a brief introductory call, mutual NDA, and review of high-level financials. No obligation, no pressure.\n\nWould you be open to a 20-minute call this week or next?\n\nBest regards,\n[YOUR_NAME]`,tip:"Keep subject lines non-threatening. Avoid 'acquisition' or 'buyout' language in first contact."},
  {name:"Post-NDA Follow-Up",tags:["[SELLER_NAME]","[COMPANY_NAME]","[YOUR_NAME]"],subject:"Next Steps — [COMPANY_NAME] Discussion",body:`Hi [SELLER_NAME],\n\nThank you for signing the NDA and taking the time to speak with us about [COMPANY_NAME]. It's clear you've built something special.\n\nTo move forward, it would be helpful to review:\n• Last 3 years of P&L statements\n• Current year YTD financials\n• A brief overview of your customer base and key contracts\n\nThere's no pressure here — we just want to make sure we can put together a thoughtful offer that reflects the true value of what you've built.\n\nLet me know if you have any questions or if there's anything else you'd like to discuss first.\n\nBest,\n[YOUR_NAME]`,tip:"Reference something specific from your call to show genuine interest."},
  {name:"LOI Submission",tags:["[SELLER_NAME]","[COMPANY_NAME]","[PRICE]","[YOUR_NAME]"],subject:"Letter of Intent — [COMPANY_NAME] Acquisition",body:`Dear [SELLER_NAME],\n\nThank you for the productive conversations over the past few weeks. We've thoroughly reviewed the materials provided and are pleased to submit this Letter of Intent to acquire [COMPANY_NAME] at a purchase price of [PRICE].\n\nKey terms of our offer include:\n• Purchase Price: [PRICE]\n• Structure: Asset purchase\n• Due Diligence Period: 45 days from acceptance\n• Exclusivity: 60 days\n• Closing: Target 90 days from acceptance\n\nThis offer reflects our genuine enthusiasm for [COMPANY_NAME] and our commitment to a smooth transition for you, your team, and your customers.\n\nWe look forward to your response and hope to move forward together.\n\nSincerely,\n[YOUR_NAME]`,tip:"Customize the structure and timeline based on your specific deal terms."},
  {name:"Request for Additional Documents",tags:["[SELLER_NAME]","[COMPANY_NAME]","[YOUR_NAME]"],subject:"Additional Information Request — [COMPANY_NAME]",body:`Hi [SELLER_NAME],\n\nThank you for the documents provided so far. To complete our underwriting, we have a few additional requests:\n\n1. Last 3 years of business tax returns\n2. Current AR/AP aging report\n3. List of key employees and compensation\n4. Copies of major customer contracts (if applicable)\n5. Equipment list with approximate values\n\nWe understand this takes time and appreciate your cooperation. Please feel free to send documents as they become available — no need to wait until everything is ready.\n\nLet me know if you have any questions.\n\nBest,\n[YOUR_NAME]`,tip:"Be specific about what you need and why — it reduces back-and-forth."},
  {name:"Deal Dead — Respectful Close",tags:["[SELLER_NAME]","[COMPANY_NAME]","[YOUR_NAME]"],subject:"Re: [COMPANY_NAME] — Closing the Loop",body:`Dear [SELLER_NAME],\n\nThank you for the time and transparency you've shown throughout our conversations about [COMPANY_NAME].\n\nAfter careful consideration, we've decided not to move forward with an offer at this time. This decision is not a reflection of the business you've built — it's a matter of fit with our current investment criteria.\n\nI have a great deal of respect for what you've accomplished, and I wish you and [COMPANY_NAME] continued success.\n\nIf circumstances change on either side in the future, I hope we can reconnect.\n\nWith appreciation,\n[YOUR_NAME]`,tip:"Always close gracefully. Sellers talk to other sellers — and sometimes come back."},
  {name:"Broker Introduction",tags:["[BROKER_NAME]","[COMPANY_NAME]","[YOUR_NAME]"],subject:"Inquiry — [COMPANY_NAME] Listing",body:`Hi [BROKER_NAME],\n\nI came across the listing for [COMPANY_NAME] and wanted to reach out directly. We're a private acquisition group actively looking for businesses in this space.\n\nCould you share the CIM or any additional information about the listing? We're prepared to sign an NDA and can typically move quickly through the review process.\n\nA few quick questions:\n• Is the seller motivated and engaged?\n• Has there been significant buyer interest already?\n• Are they flexible on deal structure?\n\nLooking forward to connecting.\n\nBest,\n[YOUR_NAME]`,tip:"Brokers want to know you're serious. Mention your timeline and decisiveness."},
  {name:"Post-Close Thank You",tags:["[SELLER_NAME]","[COMPANY_NAME]","[YOUR_NAME]"],subject:"Thank You — A New Chapter for [COMPANY_NAME]",body:`Dear [SELLER_NAME],\n\nNow that the dust has settled, I wanted to take a moment to sincerely thank you for entrusting us with [COMPANY_NAME].\n\nWe know this wasn't just a financial transaction for you — it represents years of your life, your relationships, and your hard work. We don't take that lightly.\n\nOur commitment to you and to everyone associated with [COMPANY_NAME] is to honor what you've built and to grow it responsibly.\n\nThank you again. We're excited for what's ahead.\n\nWith gratitude,\n[YOUR_NAME]`,tip:"A heartfelt post-close note can open doors for referrals and future deals."},
  {name:"Re-Engagement (Cold Deal)",tags:["[SELLER_NAME]","[COMPANY_NAME]","[YOUR_NAME]"],subject:"Checking In — [COMPANY_NAME]",body:`Hi [SELLER_NAME],\n\nI hope you're doing well. It's been a few months since we last spoke about [COMPANY_NAME], and I wanted to check in.\n\nWe're still actively looking at opportunities in your space, and if your situation or thinking has changed at all, I'd love to reconnect.\n\nNo pressure at all — just wanted to make sure you know the door is still open on our end.\n\nHope all is going well with the business.\n\nWarm regards,\n[YOUR_NAME]`,tip:"Timing matters. Many deals happen 6-18 months after first contact — stay warm."},

function ImportExcel({setContacts,setDeals,setMeetings,setTasks,toast}){
  const[drag,setDrag]=useState(false);const[log,setLog]=useState([]);const ref=useRef();
  const process=async file=>{
    if(!file)return;if(!file.name.match(/\.xlsx?$/i)){setLog([{t:"error",m:"Please upload an .xlsx file."}]);return;}
    const XLSX=window.XLSX;if(!XLSX){setLog([{t:"error",m:"xlsx library not loaded."}]);return;}
    try{
      const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:"array"});const nl=[];
      const find=(...keys)=>{const i=wb.SheetNames.findIndex(s=>keys.some(k=>s.toLowerCase().replace(/[^a-z]/g,"").includes(k)));return i>=0?XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[i]]):null;};
      const cr=find("contact");if(cr){const m=cr.map(r=>({id:genId("CA"),firstName:r["First Name"]||"",lastName:r["Last Name"]||"",company:r["Company"]||"",title:r["Title"]||"",email:r["Email"]||"",phone:r["Phone"]||"",contactType:r["Contact Type"]||"Prospect",source:r["Source"]||"",status:r["Status"]||"Active",owner:r["Owner"]||"",lastContacted:r["Last Contacted"]||"",notes:r["Notes"]||"",customValues:{},assignees:[]})).filter(c=>c.firstName||c.email);if(m.length){try{for(const c of m)await DB.upsertContact(objToRow(c));setContacts(p=>{const n=[...p,...m];return n;});nl.push({t:"success",m:`✅ Imported ${m.length} contacts`});}catch(e){nl.push({t:"error",m:`Contact import failed: ${e.message}`});}}}
      const lr=find("deal","lead","pipeline");if(lr){const m=lr.map(r=>({...DEAL_DEFAULTS,id:genId("LD"),companyName:r["Company Name"]||r["Company"]||"",leadSource:r["Lead Source"]||r["Source"]||"",industry:r["Industry"]||"",stage:r["Stage"]||"Contacted",status:r["Status"]||"Active",askingPrice:r["Asking Price"]||"",annualRevenue:r["Annual Revenue"]||"",ebitdaReported:r["EBITDA"]||"",dateAdded:r["Date Added"]||todayStr(),notes:r["Notes"]||"",assignees:[]})).filter(d=>d.companyName);if(m.length){try{for(const d of m)await DB.upsertDeal(objToRow(d));setDeals(p=>[...p,...m]);nl.push({t:"success",m:`✅ Imported ${m.length} deals`});}catch(e){nl.push({t:"error",m:`Deal import failed: ${e.message}`});}}}
      setLog(nl.length?nl:[{t:"error",m:"No recognisable sheets found."}]);if(nl.some(l=>l.t==="success"))toast("Import complete!","success");
    }catch(err){setLog([{t:"error",m:`Error: ${err.message}`}]);toast("Import failed","error");}
  };
  return(<div style={{maxWidth:580}}>
    <div className="card" style={{marginBottom:16}}><div className="card-title">Import Instructions</div><div style={{fontSize:13,color:"var(--text-2)",lineHeight:1.7}}>Prepare an <strong>.xlsx</strong> file with sheets named <strong>Contacts</strong>, <strong>Deals</strong>, <strong>Meetings</strong>, <strong>Tasks</strong>.</div></div>
    <div className={`dropzone${drag?" drag-over":""}`} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files[0]);}} onClick={()=>ref.current.click()}>
      <div style={{fontSize:32,marginBottom:8}}>📂</div><div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Drag &amp; drop your Excel file here</div><div style={{fontSize:12.5,color:"var(--text-3)"}}>or click to browse · .xlsx files</div>
      <input ref={ref} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>{process(e.target.files[0]);e.target.value="";}}/>
    </div>
    {log.length>0&&<div style={{marginTop:14}}>{log.map((l,i)=><div key={i} className={`log-item ${l.t}`}>{l.m}</div>)}</div>}
  </div>);
}

        <div className="fg full"><label className="form-label">Target Industries</label><select className="form-select" multiple value={bb.targetIndustries||[]} onChange={e=>setBb(p=>({...p,targetIndustries:Array.from(e.target.selectedOptions,o=>o.value)}))} style={{minHeight:120}}>{INDUSTRIES.map(i=><option key={i}>{i}</option>)}</select><div style={{fontSize:11,color:"var(--text-3)",marginTop:4}}>Hold Ctrl/Cmd to select multiple</div></div>
      </div>
      <div style={{marginTop:16}}><button className="btn btn-primary" onClick={saveBuyBox}>Save Buy-Box</button></div>

function App(){
  const[section,setSection]=useState("dashboard");
  const[currentUser,setCurrentUser]=useState(null);// {email, full_name, role, is_super_admin}
  const[users,setUsers]=useState([]);
  const[deals,setDeals]=useState([]);
  const[contacts,setContacts]=useState([]);
  const[meetings,setMeetings]=useState([]);
  const[tasks,setTasks]=useState([]);
  const[customFields,setCustomFields]=useState({});
  const[buyBox,setBuyBox]=useState({});
  const[toasts,setToasts]=useState([]);
  const[appState,setAppState]=useState("loading");// loading | login | firstrun | ready
  const[loginEmail,setLoginEmail]=useState("");
  const[loginPw,setLoginPw]=useState("");
  const[loginError,setLoginError]=useState("");
  const[migrating,setMigrating]=useState(false);

  const toast=useCallback((msg,type="success")=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);},[]);
  const isAdmin=currentUser?.role==="admin"||currentUser?.is_super_admin;

  /* ── Boot: check Supabase connection + users ──────────────── */
  useEffect(()=>{
    (async()=>{
      try{
        const allUsers=await DB.getUsers();
        if(!allUsers||allUsers.length===0){setAppState("firstrun");return;}
        // check for saved session
        const saved=sessionStorage.getItem("bba_session");
        if(saved){try{const u=JSON.parse(saved);const match=allUsers.find(x=>x.email===u.email&&x.password_plain===u.password_plain);if(match){setCurrentUser(match);await loadData(match,allUsers);return;}}catch{}}
        setUsers(allUsers);
        setAppState("login");
      }catch(e){console.error("Boot error:",e);setAppState("login");}
    })();
  },[]);

  const loadData=async(user,allUsersList)=>{
    try{
      const[rawDeals,rawContacts,rawTasks,rawMeetings,allUsrs]=await Promise.all([
        DB.getDeals(),DB.getContacts(),DB.getTasks(),DB.getMeetings(),
        allUsersList?Promise.resolve(allUsersList):DB.getUsers()
      ]);
      setUsers(allUsrs||[]);
      const uIsAdmin=user?.role==="admin"||user?.is_super_admin;
      const userEmail=(user?.email||"").toLowerCase();
      const allDealObjs=rawDeals.map(rowToObj);
      const allContactObjs=rawContacts.map(rowToObj);
      const allTaskObjs=rawTasks.map(rowToObj);
      if(uIsAdmin){
        // admins see everything
        setDeals(allDealObjs);
        setContacts(allContactObjs);
        setTasks(allTaskObjs);
      }else{
        // regular users: deals and tasks must be explicitly assigned to them
        setDeals(allDealObjs.filter(o=>Array.isArray(o.assignees)&&o.assignees.map(e=>e.toLowerCase()).includes(userEmail)));
        // contacts: unassigned contacts visible to all; assigned contacts only to assignees
        setContacts(allContactObjs.filter(c=>!c.assignees||c.assignees.length===0||c.assignees.map(e=>e.toLowerCase()).includes(userEmail)));
        setTasks(allTaskObjs.filter(o=>Array.isArray(o.assignees)&&o.assignees.map(e=>e.toLowerCase()).includes(userEmail)));
      }
      setMeetings(rawMeetings.map(rowToObj));
      try{const cf=localStorage.getItem("bba_cf");if(cf)setCustomFields(JSON.parse(cf));}catch{}
      try{const bb=localStorage.getItem("bba_buybox");if(bb)setBuyBox(JSON.parse(bb));}catch{}
      setAppState("ready");
      const params=new URLSearchParams(window.location.search);const raw=params.get("import");
      if(raw){window.history.replaceState({},"",window.location.pathname);processImport(raw,rawDeals.map(rowToObj),user);}
      const pending=sessionStorage.getItem("bba_pending_import");
      if(pending){sessionStorage.removeItem("bba_pending_import");processImport(pending,rawDeals.map(rowToObj),user);}
    }catch(e){console.error("loadData error:",e);toast("Failed to load data: "+e.message,"error");setAppState("ready");}
  };

  /* ── First-run: auto-migrate localStorage → Supabase ────── */
  const handleFirstRun=async()=>{
    setMigrating(true);
    try{
      // admin account already exists from SQL insert — just load
      const allUsers=await DB.getUsers();
      setUsers(allUsers);
      // migrate localStorage data if any exists
      const lsDeals=JSON.parse(localStorage.getItem("bba_deals")||"[]");
      const lsContacts=JSON.parse(localStorage.getItem("bba_contacts")||"[]");
      const lsTasks=JSON.parse(localStorage.getItem("bba_tasks")||"[]");
      const lsMeetings=JSON.parse(localStorage.getItem("bba_meetings")||"[]");
      if(lsDeals.length||lsContacts.length||lsTasks.length||lsMeetings.length){
        toast(`Migrating ${lsDeals.length} deals, ${lsContacts.length} contacts, ${lsTasks.length} tasks, ${lsMeetings.length} meetings…`,"info");
        for(const d of lsDeals){const row=objToRow({...d,assignees:d.assignees||[]});await DB.upsertDeal(row);}
        for(const c of lsContacts){const row=objToRow({...c,assignees:c.assignees||[]});await DB.upsertContact(row);}
        for(const t of lsTasks){const row=objToRow({...t,assignees:t.assignees||[]});await DB.upsertTask(row);}
        for(const m of lsMeetings){await DB.upsertMeeting({id:m.id,data:m});}
        toast("Migration complete! Your existing data has been transferred to Supabase.","success");
      }
      setAppState("login");
    }catch(e){toast("Setup error: "+e.message,"error");}
    setMigrating(false);
  };

  /* ── Login ───────────────────────────────────────────────── */
  const doLogin=async()=>{
    setLoginError("");
    try{
      const allUsers=await DB.getUsers();
      const match=allUsers.find(u=>u.email.toLowerCase()===loginEmail.trim().toLowerCase()&&u.password_plain===loginPw);
      if(!match){setLoginError("Incorrect email or password.");return;}
      sessionStorage.setItem("bba_session",JSON.stringify({email:match.email,password_plain:match.password_plain}));
      setCurrentUser(match);
      await loadData(match,allUsers);
    }catch(e){setLoginError("Connection error: "+e.message);}
  };

  /* ── URL Import ──────────────────────────────────────────── */
  // Check URL on load (before login)
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const raw=params.get("import");
    if(raw){window.history.replaceState({},"",window.location.pathname);sessionStorage.setItem("bba_pending_import",raw);}
  },[]);

  const processImport=async(raw,existingDeals,user)=>{
    try{
      const b64=raw.replace(/-/g,"+").replace(/_/g,"/");
      const json=decodeURIComponent(escape(atob(b64)));
      const data=JSON.parse(json);
      if(!data.companyName)throw new Error("Missing company name");
      const now=todayStr();
      const CLAUDE_FIELDS=["askingPrice","annualRevenue","grossProfit","ebitdaReported","sdeReported","sellerSalary","inventoryIncluded","realEstateIncluded","workingCapitalIncluded","addBacksTotal","normalizedEbitda","normalizedSde","recurringRevenuePct","topCustomerPct","customerConcentrationPct","capexIntensityPct","debtAmount","interestRatePercent","amortizationMonths","estimatedDownPayment","estimatedSellerNotePct","estimatedClosingCosts","estimatedWorkingCapitalNeed","overallDealScore","industryAttractivenessScore","recurringRevenueScore","customerConcentrationRiskScore","sellerDependenceScore","managementTeamScore","revenueTrendScore","marginQualityScore","capexRiskScore","financingFitScore","strategicFitScore","transitionRiskScore","redFlagCount","redFlagSummary","dealVerdict","decisionRationale","closeProbabilityPct","industry","businessModel","geographyState","geographyCity","leadSource","brokerDeal","brokerName","brokerEmail","brokerPhone","listingUrl","companyWebsite","contactName","contactTitle","contactEmail","contactPhone"];
      const d=new Date();const mm=String(d.getMonth()+1).padStart(2,"0");const dy=String(d.getDate()).padStart(2,"0");const y=d.getFullYear();
      const stampedAnalysis=data.claudeAnalysis?`[Analysis imported ${mm}/${dy}/${y}]\n\n${data.claudeAnalysis}`:null;
      const src=existingDeals||deals;
      const existingIdx=src.findIndex(d=>d.companyName.trim().toLowerCase()===data.companyName.trim().toLowerCase());
      let targetId,isUpdate=false,finalDeal;
      if(existingIdx>=0){
        isUpdate=true;const existing=src[existingIdx];
        const claudeUpdates={};CLAUDE_FIELDS.forEach(k=>{if(data[k]!==undefined)claudeUpdates[k]=data[k];});
        if(stampedAnalysis)claudeUpdates.claudeAnalysis=stampedAnalysis;
        finalDeal={...existing,...claudeUpdates,updatedAt:now,lastActivityDate:now};
        DILIGENCE_FIELDS.forEach(f=>{if(!(f in finalDeal))finalDeal[f]=false;});
        await DB.upsertDeal(objToRow(finalDeal));
        setDeals(p=>p.map(d=>d.id===existing.id?finalDeal:d));
        targetId=existing.id;toast(`🔄 Deal updated: ${finalDeal.companyName}`,"success");
      }else{
        finalDeal={...DEAL_DEFAULTS,...data,...(stampedAnalysis?{claudeAnalysis:stampedAnalysis}:{}),id:genId("LD"),dateAdded:now,lastActivityDate:now,stageEntryDate:now,createdAt:now,updatedAt:now,customValues:{},assignees:[]};
        DILIGENCE_FIELDS.forEach(f=>{if(!(f in finalDeal))finalDeal[f]=false;});
        await DB.upsertDeal(objToRow(finalDeal));
        setDeals(p=>[...p,finalDeal]);
        targetId=finalDeal.id;toast(`✅ Deal imported: ${finalDeal.companyName}`,"success");
      }
      setSection("pipeline");localStorage.setItem("bba_import_open",targetId);
    }catch(e){toast(`Import failed: ${e.message}`,"error");console.error("Import error:",e);}
  };

  const doLogout=()=>{sessionStorage.removeItem("bba_session");setCurrentUser(null);setDeals([]);setContacts([]);setTasks([]);setMeetings([]);setAppState("login");};

  /* ── 30-second background polling ───────────────────────── */
  useEffect(()=>{
    if(appState!=="ready"||!currentUser)return;
    const poll=async()=>{
      try{
        const uIsAdmin=currentUser.role==="admin"||currentUser.is_super_admin;
        const userEmail=(currentUser.email||"").toLowerCase();
        const[rawDeals,rawContacts,rawTasks,rawMeetings]=await Promise.all([
          DB.getDeals(),DB.getContacts(),DB.getTasks(),DB.getMeetings()
        ]);
        const allDealObjs=rawDeals.map(rowToObj);
        const allContactObjs=rawContacts.map(rowToObj);
        const allTaskObjs=rawTasks.map(rowToObj);
        if(uIsAdmin){
          setDeals(allDealObjs);
          setContacts(allContactObjs);
          setTasks(allTaskObjs);
        }else{
          setDeals(allDealObjs.filter(o=>Array.isArray(o.assignees)&&o.assignees.map(e=>e.toLowerCase()).includes(userEmail)));
          setContacts(allContactObjs.filter(c=>!c.assignees||c.assignees.length===0||c.assignees.map(e=>e.toLowerCase()).includes(userEmail)));
          setTasks(allTaskObjs.filter(o=>Array.isArray(o.assignees)&&o.assignees.map(e=>e.toLowerCase()).includes(userEmail)));
        }
        setMeetings(rawMeetings.map(rowToObj));
        // also check for a pending import that came in via URL while logged in
        const importId=localStorage.getItem("bba_import_open");
        if(importId)setSection("pipeline");
      }catch(e){console.warn("Poll error:",e);}
    };
    const id=setInterval(poll,30000);
    return()=>clearInterval(id);
  },[appState,currentUser]);
  const saveBB=bb=>{setBuyBox(bb);try{localStorage.setItem("bba_buybox",JSON.stringify(bb));}catch{}toast("Buy-box saved","success");};

  const odCnt=tasks.filter(t=>isOD(t.dueDate,t.status)).length;
  const nav=isAdmin?NAV_ADMIN:NAV_USER;
  const tb=TOPBAR_MAP[section]||{};

  /* ── LOADING SCREEN ──────────────────────────────────────── */
  if(appState==="loading"){
    return(<div className="loading-screen"><div className="spinner"/><div style={{fontFamily:"Cormorant Garamond,serif",fontSize:20,fontWeight:600,color:"var(--text-2)"}}>Connecting to Blackbox Advisory CRM…</div></div>);
  }

  /* ── FIRST RUN ───────────────────────────────────────────── */
  if(appState==="firstrun"){
    return(<div style={{display:"flex",height:"100vh",width:"100vw",alignItems:"center",justifyContent:"center",background:"var(--primary)"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"48px 44px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",width:"100%",maxWidth:480,textAlign:"center"}}>
        <div style={{width:56,height:56,borderRadius:12,background:"rgba(241,92,43,0.12)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontFamily:"Cormorant Garamond,serif",fontSize:24,fontWeight:700,color:"var(--primary)"}}>BBA</div>
        <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:26,fontWeight:700,marginBottom:8}}>Welcome to Blackbox Advisory CRM</div>
        <div style={{fontSize:13,color:"var(--text-3)",marginBottom:28,lineHeight:1.65}}>First-time setup detected. Click below to initialize the system and migrate any existing data from this browser to your Supabase database.</div>
        {migrating?<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,color:"var(--text-2)"}}><div className="spinner" style={{width:20,height:20}}/><span>Migrating data…</span></div>:<button onClick={handleFirstRun} style={{width:"100%",padding:"12px",background:"var(--primary)",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Initialize CRM →</button>}
        <div style={{marginTop:20,padding:"12px 16px",background:"rgba(241,92,43,0.07)",borderRadius:8,textAlign:"left"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--primary)",marginBottom:4}}>Your initial admin credentials:</div>
          <div style={{fontSize:12,color:"var(--text-2)"}}>Email: <strong>admin@blackboxadvisory.com</strong></div>
          <div style={{fontSize:12,color:"var(--text-2)"}}>Password: <strong>Blackbox2025!</strong></div>
          <div style={{fontSize:11,color:"var(--text-3)",marginTop:4}}>Change these in User Management after your first login.</div>
        </div>
      </div>
    </div>);
  }

  /* ── LOGIN ───────────────────────────────────────────────── */
  if(appState==="login"||!currentUser){
    return(<div style={{display:"flex",height:"100vh",width:"100vw",alignItems:"center",justifyContent:"center",background:"var(--primary)"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"48px 44px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",width:"100%",maxWidth:400,textAlign:"center"}}>
        <div style={{width:56,height:56,borderRadius:12,background:"rgba(241,92,43,0.12)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontFamily:"Cormorant Garamond,serif",fontSize:24,fontWeight:700,color:"var(--primary)"}}>BBA</div>
        <div style={{fontFamily:"Cormorant Garamond,serif",fontSize:26,fontWeight:700,marginBottom:6}}>Blackbox Advisory</div>
        <div style={{fontSize:12,color:"var(--text-3)",marginBottom:32,textTransform:"uppercase",letterSpacing:"0.5px"}}>Acquisition CRM</div>
        <div style={{textAlign:"left",marginBottom:6}}><label style={{fontSize:11,fontWeight:700,color:"var(--text-2)",textTransform:"uppercase",letterSpacing:"0.4px"}}>Email</label></div>
        <input type="email" value={loginEmail} onChange={e=>{setLoginEmail(e.target.value);setLoginError("");}} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="your@email.com" style={{width:"100%",padding:"10px 14px",border:`1px solid ${loginError?"#EF4444":"var(--border)"}`,borderRadius:8,fontSize:14,fontFamily:"DM Sans,sans-serif",outline:"none",marginBottom:10}}/>
        <div style={{textAlign:"left",marginBottom:6}}><label style={{fontSize:11,fontWeight:700,color:"var(--text-2)",textTransform:"uppercase",letterSpacing:"0.4px"}}>Password</label></div>
        <input type="password" value={loginPw} onChange={e=>{setLoginPw(e.target.value);setLoginError("");}} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="Password" style={{width:"100%",padding:"10px 14px",border:`1px solid ${loginError?"#EF4444":"var(--border)"}`,borderRadius:8,fontSize:14,fontFamily:"DM Sans,sans-serif",outline:"none",marginBottom:loginError?6:16}}/>
        {loginError&&<div style={{fontSize:12,color:"#EF4444",marginBottom:12,textAlign:"left"}}>{loginError}</div>}
        <button onClick={doLogin} style={{width:"100%",padding:"11px",background:"var(--primary)",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Sign In →</button>
      </div>
    </div>);
  }

  /* ── MAIN APP ────────────────────────────────────────────── */
  return(<div style={{display:"flex",height:"100vh",width:"100vw",overflow:"hidden"}}>
    <div className="sidebar">
      <div className="sidebar-brand"><div className="sidebar-mono">BBA</div><div className="sidebar-name">Blackbox Advisory</div><div className="sidebar-tag">Acquisition CRM</div></div>
      <nav className="sidebar-nav">{nav.map(({section:sec,items})=><div key={sec}><div className="nav-section">{sec}</div>{items.map(n=>{const IC=Ic[n.icon];return(<div key={n.id} className={`nav-item${section===n.id?" active":""}`} onClick={()=>setSection(n.id)}><span className="nav-icon"><IC/></span>{n.label}{n.id==="tasks"&&odCnt>0&&<span className="nav-badge">{odCnt}</span>}</div>);})}</div>)}</nav>
      <div className="sidebar-foot">
        <SidebarUserMenu currentUser={currentUser} isAdmin={isAdmin} onLogout={doLogout}/>
      </div>
    </div>
    <div className="main">
      <div className="topbar"><span className="topbar-title">{tb.title}</span><span className="topbar-sub">{tb.sub}</span></div>
      <div className="content">
        {section==="dashboard"&&<Dashboard deals={deals} contacts={contacts} meetings={meetings} tasks={tasks} buyBox={buyBox} setSection={setSection} isAdmin={isAdmin}/>}
        {section==="pipeline"&&<Pipeline deals={deals} setDeals={setDeals} contacts={contacts} setContacts={setContacts} customFields={customFields} toast={toast} setTasks={setTasks} tasks={tasks} buyBox={buyBox} users={users} isAdmin={isAdmin} currentUser={currentUser}/>}
        {section==="contacts"&&<Contacts contacts={contacts} setContacts={setContacts} deals={deals} customFields={customFields} toast={toast} setSection={setSection} users={users} isAdmin={isAdmin} currentUser={currentUser}/>}
        {section==="meetings"&&<Meetings meetings={meetings} setMeetings={setMeetings} customFields={customFields} toast={toast}/>}
        {section==="tasks"&&<Tasks tasks={tasks} setTasks={setTasks} customFields={customFields} toast={toast} contacts={contacts} setContacts={setContacts} deals={deals} setDeals={setDeals} users={users} isAdmin={isAdmin} currentUser={currentUser}/>}
        {section==="reports"&&<Reports deals={deals}/>}
        {section==="templates"&&<EmailTemplates toast={toast}/>}
        {section==="import"&&isAdmin&&<ImportExcel setContacts={setContacts} setDeals={setDeals} setMeetings={setMeetings} setTasks={setTasks} toast={toast}/>}
        {section==="users"&&isAdmin&&<UserManagement users={users} setUsers={setUsers} currentUser={currentUser} toast={toast} onMigrateComplete={()=>loadData(currentUser,null)}/>}
        {section==="settings"&&isAdmin&&<Settings customFields={customFields} setCustomFields={setCustomFields} buyBox={buyBox} setBuyBox={setBuyBox} saveCF={saveCF} saveBB={saveBB}/>}
      </div>
    </div>
    <Toasts toasts={toasts}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
